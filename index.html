<html lang="zh-CN">

  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%20128%20128%22%3E%0A%3Cdefs%3E%3ClinearGradient%20id%3D%22g%22%20x1%3D%2218%22%20y1%3D%2218%22%20x2%3D%22110%22%20y2%3D%22110%22%3E%3Cstop%20stop-color%3D%22%23b86cff%22/%3E%3Cstop%20offset%3D%22.56%22%20stop-color%3D%22%237566f7%22/%3E%3Cstop%20offset%3D%221%22%20stop-color%3D%22%234f8cff%22/%3E%3C/linearGradient%3E%3C/defs%3E%0A%3Crect%20width%3D%22128%22%20height%3D%22128%22%20rx%3D%2232%22%20fill%3D%22%23f4f6ff%22/%3E%0A%3Ccircle%20cx%3D%2264%22%20cy%3D%2264%22%20r%3D%2242%22%20fill%3D%22white%22%20stroke%3D%22url%28%23g%29%22%20stroke-width%3D%228%22/%3E%0A%3Ccircle%20cx%3D%2264%22%20cy%3D%2264%22%20r%3D%2229%22%20fill%3D%22none%22%20stroke%3D%22%235e6f9a%22%20stroke-width%3D%225%22%20stroke-dasharray%3D%229%208%22/%3E%0A%3Cline%20x1%3D%2264%22%20y1%3D%2264%22%20x2%3D%2264%22%20y2%3D%2238%22%20stroke%3D%22%23ff6076%22%20stroke-width%3D%227%22%20stroke-linecap%3D%22round%22/%3E%0A%3Cline%20x1%3D%2264%22%20y1%3D%2264%22%20x2%3D%2288%22%20y2%3D%2278%22%20stroke%3D%22%23ff6076%22%20stroke-width%3D%227%22%20stroke-linecap%3D%22round%22/%3E%0A%3Ccircle%20cx%3D%2264%22%20cy%3D%2264%22%20r%3D%229%22%20fill%3D%22%23ffc94d%22/%3E%0A%3C/svg%3E">
  <title>谷歌 2FA 验证码生成器</title>
<script defer src="/app.js"></script>

<style>
:root {
  color-scheme: light;
  --ink: #17203a;
  --muted: #66728c;
  --line: #e2e6f1;
  --violet: #7848ec;
  --blue: #4c7df4;
  --accent: #6e54ee;
  --accent-dark: #5239c9;
  --radius-card: 32px;
  --radius-panel: 20px;
  --radius-pill: 999px;
  font-family: "Segoe UI Variable", "PingFang SC", "Microsoft YaHei", sans-serif;
}

* { box-sizing: border-box; }
body { margin: 0; min-width: 320px; min-height: 100dvh; padding: clamp(24px,4vh,52px) 0; display: grid; place-items: center; color: var(--ink); background: #edf1ff; }
button, textarea { font: inherit; }
button { -webkit-tap-highlight-color: transparent; }

.backdrop { position: fixed; inset: 0; z-index: -2; overflow: hidden; background: linear-gradient(145deg,#e3ebff 0%,#f9f8ff 46%,#eee5ff 100%); }
.backdrop::after { content: ""; position: absolute; inset: 0; opacity: .24; background-image: radial-gradient(rgba(85,91,168,.35) .7px,transparent .7px); background-size: 24px 24px; mask-image: linear-gradient(to bottom,#000,transparent 84%); }
.backdrop i { position: absolute; border-radius: 44% 56% 62% 38% / 54% 42% 58% 46%; filter: blur(8px); animation: drift 12s ease-in-out infinite alternate; }
.backdrop i:nth-child(1) { width: 380px; height: 380px; left: -190px; top: 20%; background: rgba(72,135,255,.22); }
.backdrop i:nth-child(2) { width: 340px; height: 340px; right: -120px; top: -110px; background: rgba(175,92,255,.2); animation-delay: -4s; }
.backdrop i:nth-child(3) { width: 260px; height: 260px; right: 8%; bottom: -140px; background: rgba(72,142,255,.18); animation-delay: -7s; }

.app-shell { width: min(880px,calc(100% - 28px)); margin: 0 auto; }
.app-card { position: relative; overflow: hidden; padding: 31px 34px 28px; border: 1px solid rgba(255,255,255,.94); border-radius: var(--radius-card); background: rgba(255,255,255,.88); box-shadow: 0 28px 80px rgba(70,64,145,.17),inset 0 1px 0 white; backdrop-filter: blur(25px) saturate(130%); -webkit-backdrop-filter: blur(25px) saturate(130%); animation: cardIn .55s cubic-bezier(.22,.8,.3,1) both; }
.app-card::before { content: ""; position: absolute; width: 260px; height: 260px; right: -120px; top: -150px; border-radius: 50%; background: radial-gradient(circle,rgba(155,103,255,.18),transparent 70%); pointer-events: none; }

.hero { position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; }
.logo { width: 64px; height: 64px; position: relative; display: grid; place-items: center; border: 1px solid #d8d5ff; border-radius: 21px; background: linear-gradient(145deg,#f2eaff,#e5f0ff); box-shadow: inset 0 1px 0 white,0 12px 30px rgba(96,80,220,.15); animation: logoFloat 4s ease-in-out infinite; }
.logo-orbit { width: 37px; height: 37px; border-radius: 50%; border: 4px dotted var(--accent); box-shadow: inset 0 0 0 3px white,0 0 0 2px rgba(77,125,247,.2); animation: orbitSpin 14s linear infinite; }
.logo-orbit::after { content: ""; position: absolute; width: 8px; height: 8px; left: 26px; top: 26px; border-radius: 50%; background: #ffbd4a; box-shadow: 0 0 0 4px white; }
.logo-hand { position: absolute; width: 3px; height: 13px; left: 29px; top: 16px; border-radius: 3px; background: #f36d78; transform-origin: bottom; transform: rotate(-8deg); animation: handTick 3s steps(12,end) infinite; }
.title-wrap { margin-top: 14px; }
.hero h1 { margin: 0; font-size: clamp(36px,5.5vw,51px); line-height: 1.05; letter-spacing: -.055em; font-weight: 820; }
.hero h1 span { color: transparent; background: linear-gradient(90deg,var(--violet),var(--blue)); background-clip: text; -webkit-background-clip: text; }
.hero p { margin: 8px 0 0; color: #4e5a75; font-size: 17px; font-weight: 700; }
.divider { height: 1px; margin: 20px 0 16px; background: linear-gradient(90deg,transparent,#dde2ec 10%,#dde2ec 90%,transparent); }

.code-area { text-align: center; }
.status-pill { width: fit-content; min-height: 34px; margin: 0 auto 13px; padding: 0 14px; display: flex; align-items: center; gap: 8px; color: #5a4bb2; border: 1px solid #dfdef2; border-radius: var(--radius-pill); background: linear-gradient(180deg,#fbfaff,#f3f5ff); box-shadow: 0 7px 18px rgba(70,65,135,.06); font-size: 12px; font-weight: 750; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 5px rgba(116,87,245,.12); animation: statusPulse 2.2s ease-in-out infinite; }

.code-display { position: relative; isolation: isolate; overflow: hidden; width: min(670px,100%); height: 158px; margin: auto; padding: 0 clamp(28px,5vw,58px); display: grid; grid-template-columns: 1fr 34px 1fr; place-items: center; gap: 14px; border: 1px solid #dcdcf4; border-radius: 30px; background: radial-gradient(circle at 20% 18%,rgba(156,102,245,.08),transparent 32%),radial-gradient(circle at 86% 82%,rgba(77,135,244,.10),transparent 34%),linear-gradient(135deg,#fcfaff 0%,#f4f6ff 58%,#e9f1ff 100%); box-shadow: 0 20px 42px rgba(75,72,157,.12),inset 0 1px 0 white; }
.code-display::before { content: ""; position: absolute; inset: 0 0 auto; height: 2px; background: linear-gradient(90deg,transparent,#a76fff,#6fa2ff,transparent); opacity: .65; }
.code-display::after { content: ""; position: absolute; z-index: -1; width: 260px; height: 260px; right: -120px; bottom: -170px; border-radius: 50%; background: linear-gradient(135deg,rgba(145,92,245,.1),rgba(91,151,255,.2)); }
.code-display > span { position: relative; color: transparent; background: linear-gradient(180deg,#9150e9,#5175ee); background-clip: text; -webkit-background-clip: text; font-family: "Cascadia Mono","SFMono-Regular",Consolas,monospace; font-size: clamp(82px,10.8vw,104px); line-height: 1; letter-spacing: .075em; transform: translateX(.05em); font-weight: 850; font-variant-numeric: tabular-nums; text-shadow: 0 13px 28px rgba(91,74,222,.13); }
.code-separator { width: 10px; height: 10px; border-radius: 3px; background: linear-gradient(135deg,#a070f1,#5f82ef); box-shadow: 0 0 0 7px rgba(126,91,235,.08),0 8px 18px rgba(98,77,202,.18); transform: rotate(45deg); }
.code-display.is-refreshing > span { animation: codeFlip .38s cubic-bezier(.22,.8,.3,1); }
.countdown { width: fit-content; margin: 12px auto 14px; padding: 6px 14px 6px 7px; display: flex; align-items: center; gap: 8px; color: #4d4679; border: 1px solid #d9d4f7; border-radius: var(--radius-pill); background: linear-gradient(135deg,#eeeaff,#edf3ff); box-shadow: 0 8px 20px rgba(77,68,153,.1),inset 0 1px 0 rgba(255,255,255,.8); font-size: 12px; font-weight: 750; }
.timer-ring { --progress: 1; width: 32px; height: 32px; position: relative; display: grid; place-items: center; border-radius: 50%; background: conic-gradient(var(--accent) calc(var(--progress)*1turn),#e6e9f0 0); font-size: 11px; font-weight: 800; will-change: background; }
.timer-ring::before { content: ""; position: absolute; inset: 4px; border-radius: 50%; background: white; box-shadow: inset 0 0 0 1px rgba(102,88,210,.08); }
.timer-ring span { position: relative; z-index: 1; }
.inline-error,.field-error { color: #bd394b; font-size: 13px; font-weight: 700; }

.action-grid { width: min(670px,100%); margin: 0 auto; display: grid; grid-template-columns: 1.15fr 1fr 1fr; gap: 11px; }
.button { min-height: 54px; padding: 0 22px; border-radius: var(--radius-pill); border: 1px solid transparent; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; font-weight: 750; white-space: nowrap; cursor: pointer; transition: transform .18s ease,box-shadow .18s ease,background .18s ease,border-color .18s ease; }
.button:hover { transform: translateY(-2px); }
.button:active { transform: translateY(1px) scale(.975); }
.button-primary { color: white; background: linear-gradient(105deg,#7649ef,#4f80f4); box-shadow: 0 12px 25px rgba(94,78,234,.25),inset 0 1px 0 rgba(255,255,255,.3); }
.button-primary:hover { box-shadow: 0 16px 30px rgba(94,78,234,.32),inset 0 1px 0 rgba(255,255,255,.3); }
.button-secondary { color: #36415a; border-color: #e0e3ec; background: rgba(255,255,255,.94); box-shadow: 0 7px 18px rgba(48,58,100,.05); }
.button-secondary:hover { border-color: #c9cede; background: white; }
.button.is-success { color: white; border-color: #2cb47c; background: #2cb47c; box-shadow: 0 10px 22px rgba(44,180,124,.22); }

.info-grid { margin-top: 16px; display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 1fr; gap: 14px; }
.info-panel { min-height: 124px; padding: 19px; display: grid; grid-template-columns: 40px 1fr; gap: 13px; border: 1px solid #d8e4f4; border-radius: var(--radius-panel); background: linear-gradient(135deg,#eef5ff,#f7f9ff); transition: transform .25s ease,box-shadow .25s ease; }
.info-panel:hover { transform: translateY(-2px); box-shadow: 0 12px 28px rgba(68,75,138,.08); }
.help-panel { border-color: #d8e4f4; background: linear-gradient(135deg,#eef5ff,#f7f9ff); }
.security-panel { border-color: #f0d5dc; background: linear-gradient(135deg,#fff3f5,#fff7fa); }
.security-panel .panel-icon { color: #d9566b; background: rgba(255,255,255,.82); }
.security-panel h2 { color: #713845; }
.security-panel p { color: #85505c; max-width: 32ch; }
.day-emphasis { display: inline-block; margin-inline: 2px; padding: 0 6px 1px; color: #c93f58; border-radius: 7px; background: #ffe0e6; font-weight: 850; }
.panel-icon { width: 40px; height: 40px; display: grid; place-items: center; color: var(--accent); border-radius: 50%; background: rgba(255,255,255,.75); box-shadow: inset 0 0 0 1px rgba(108,104,219,.08); }
.info-panel h2 { margin: 0 0 7px; font-size: 16px; }
.info-panel p { margin: 0; color: #59677f; font-size: 15px; line-height: 1.65; font-weight: 600; }

.contact-text { display: inline-flex; align-items: center; gap: 7px; }
.contact-text .icon { width: 17px; height: 17px; color: #536fb1; }

.detail-line { margin-top: 9px; display: flex; align-items: center; gap: 6px; color: #425b86; font-size: 12px; font-weight: 700; }
.detail-line .icon { color: var(--accent); }
.support-chip { min-height: 36px; margin-top: 8px; padding: 0 13px; display: inline-flex; align-items: center; gap: 8px; color: #42507a; border: 1px solid #dcdcf0; border-radius: var(--radius-pill); background: rgba(255,255,255,.92); font-weight: 750; cursor: pointer; transition: transform .18s ease,background .18s ease; }
.support-chip:hover { transform: translateY(-1px); background: white; }
.support-chip:active { transform: scale(.98); }
.support-chip.is-success { color: #18855d; background: #edfff7; border-color: #bdebd8; }
.support-chip .icon { width: 15px; height: 15px; }
.online-dot { width: 9px; height: 9px; position: relative; border-radius: 50%; background: #24bb80; }
.online-dot::after { content: ""; position: absolute; inset: -1px; border: 1px solid #24bb80; border-radius: 50%; animation: onlinePing 1.8s cubic-bezier(0,.55,.45,1) infinite; }
.footnote { margin: 11px 0 0; display: flex; align-items: center; justify-content: center; gap: 7px; color: #65708a; font-size: 11px; font-weight: 650; }

.secret-dialog { width: min(520px,calc(100% - 28px)); padding: 0; color: var(--ink); border: 1px solid rgba(255,255,255,.95); border-radius: 28px; background: #fff; box-shadow: 0 35px 110px rgba(28,30,69,.35); }
.secret-dialog::backdrop { background: rgba(31,31,66,.46); backdrop-filter: blur(7px); }
.secret-dialog[open] { animation: dialogIn .2s ease-out; }
.secret-dialog form { padding: 26px; }
.dialog-header { margin-bottom: 22px; display: grid; grid-template-columns: 44px 1fr 40px; gap: 12px; align-items: center; }
.dialog-symbol { width: 44px; height: 44px; display: grid; place-items: center; color: white; border-radius: 50%; background: linear-gradient(135deg,var(--violet),var(--blue)); }
.dialog-header span { color: var(--accent); font-size: 11px; font-weight: 750; }
.dialog-header h2 { margin: 2px 0 0; font-size: 20px; }
.close-button { width: 40px; height: 40px; display: grid; place-items: center; color: #59657d; border: 1px solid #dfe3eb; border-radius: 50%; background: white; cursor: pointer; }
.secret-dialog label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 750; }
.secret-dialog textarea { width: 100%; min-height: 104px; padding: 14px 15px; resize: vertical; color: var(--ink); border: 1px solid #cfd6e4; border-radius: 18px; background: #f8faff; outline: none; font-family: Consolas,monospace; line-height: 1.55; }
.secret-dialog textarea:focus { border-color: var(--accent); background: white; box-shadow: 0 0 0 4px rgba(116,87,245,.12); }
.field-help { margin: 8px 0 0; color: #74809a; font-size: 12px; }
.field-error { margin: 8px 0 0; }
.dialog-actions { margin-top: 20px; display: grid; grid-template-columns: 1fr 1.45fr; gap: 9px; }
.toast { position: fixed; z-index: 30; left: 50%; bottom: 20px; min-height: 42px; padding: 0 16px; display: flex; align-items: center; gap: 8px; color: white; border-radius: var(--radius-pill); background: #252d46; box-shadow: 0 16px 40px rgba(28,33,60,.28); font-size: 12px; font-weight: 700; opacity: 0; transform: translate(-50%,14px); pointer-events: none; transition: opacity .2s ease,transform .2s ease; }
.toast.is-visible { opacity: 1; transform: translate(-50%,0); }

.icon { width: 19px; height: 19px; display: inline-block; flex: 0 0 auto; background-color: currentColor; -webkit-mask: var(--icon) center/contain no-repeat; mask: var(--icon) center/contain no-repeat; }
.icon-shield { --icon:url("https://api.iconify.design/tabler/shield-lock.svg"); }
.icon-copy { --icon:url("https://api.iconify.design/tabler/copy.svg"); }
.icon-link { --icon:url("https://api.iconify.design/tabler/link.svg"); }
.icon-key { --icon:url("https://api.iconify.design/tabler/key.svg"); }
.icon-alert { --icon:url("https://api.iconify.design/tabler/alert-triangle.svg"); }
.icon-bulb { --icon:url("https://api.iconify.design/tabler/bulb.svg"); }
.icon-help { --icon:url("https://api.iconify.design/tabler/help-circle.svg"); }
.icon-check { --icon:url("https://api.iconify.design/tabler/check.svg"); }
.icon-lock { --icon:url("https://api.iconify.design/tabler/lock.svg"); }
.icon-x { --icon:url("https://api.iconify.design/tabler/x.svg"); }
@keyframes drift { to { transform: translate3d(36px,-24px,0) rotate(8deg) scale(1.06); } }
@keyframes cardIn { from { opacity: 0; transform: translateY(14px) scale(.99); } }
@keyframes logoFloat { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-5px) rotate(1deg); } }
@keyframes orbitSpin { to { transform: rotate(360deg); } }
@keyframes handTick { to { transform: rotate(352deg); } }
@keyframes statusPulse { 50% { box-shadow: 0 0 0 8px rgba(116,87,245,.04); } }
@keyframes consoleSheen { 0%,66% { left:-60%; } 86%,100% { left:120%; } }
@keyframes separatorBreathe { 50% { opacity:.48; transform:scale(.82); } }
@keyframes codeFlip { from { opacity:.2; transform:translateY(8px) scale(.96); filter:blur(3px); } }
@keyframes alertFloat { 50% { transform:translateY(-2px); } }
@keyframes onlinePing { 0% { opacity:.7; transform:scale(1); } 80%,100% { opacity:0; transform:scale(2.4); } }
@keyframes dialogIn { from { opacity:0; transform:translateY(10px) scale(.985); } }

@media (max-width:700px) {
  body { padding:9px 0 18px; place-items:start center; }
  .app-shell { width:min(100% - 18px,620px); }
  .app-card { padding:23px 19px 20px; border-radius:26px; }
  .hero h1 { font-size:clamp(29px,8vw,39px); }
  .hero p { font-size:13px; }
  .code-display { height:166px; padding-inline:24px; grid-template-columns:1fr 28px 1fr; gap:10px; border-radius:28px; }
  .code-display > span { font-size:clamp(68px,15vw,84px); }
  .action-grid { grid-template-columns:1fr 1fr; }
  .button-primary { grid-column:1/-1; }
  .info-grid { grid-template-columns:1fr; }
}

@media (max-width:460px) {
  .app-card { padding:20px 10px 17px; }
  .app-card { display:flex; flex-direction:column; }
  .logo { width:48px; height:48px; border-radius:16px; transform:scale(.86); }
  .title-wrap { margin-top:9px; }
  .hero h1 { font-size:28px; }
  .hero p { font-size:14px; }
  .divider { margin:16px 0 14px; }
  .code-area { padding:4px 0 2px; }
  .status-pill { min-height:40px; margin-bottom:14px; padding-inline:16px; font-size:14px; }
  .code-display { height:172px; padding-inline:14px; grid-template-columns:1fr 24px 1fr; gap:6px; border-radius:27px; }
  .code-display > span { font-size:clamp(62px,17vw,74px); letter-spacing:.035em; }
  .code-separator { width:9px; height:9px; border-radius:2.5px; }
  .countdown { margin:13px auto 16px; min-height:46px; padding-right:16px; font-size:13px; }
  .timer-ring { width:34px; height:34px; }
  .action-grid { grid-template-columns:1fr; gap:8px; }
  .button-primary { grid-column:auto; }
  .button { min-height:54px; font-size:16px; }
  .info-grid { order:4; margin-top:13px; }
  .info-panel { min-height:0; padding:18px; grid-template-columns:42px 1fr; gap:13px; }
  .panel-icon { width:42px; height:42px; }
  .info-panel h2 { margin-bottom:8px; font-size:18px; }
  .info-panel p { font-size:16px; line-height:1.7; font-weight:650; }
  .detail-line { font-size:14px; line-height:1.5; }
  .help-panel { padding-block:16px; }
  .help-panel .support-chip { margin-top:7px; }
  .support-chip { min-height:44px; padding-inline:15px; font-size:16px; }
  .security-panel p { max-width:none; }
  .dialog-actions { grid-template-columns:1fr; }
}

@media (prefers-reduced-motion:reduce) { *,*::before,*::after { animation-duration:.01ms!important; animation-iteration-count:1!important; transition-duration:.01ms!important; } }
@media (prefers-reduced-transparency:reduce) { .app-card { background:#fff; backdrop-filter:none; } }


/* V12 调整：Cedars8 独立第二行显示，联系区更清晰 */
.help-panel .contact-text {
  display: flex;
  align-items: center;
  gap: 7px;
  width: 100%;
  margin-bottom: 10px;
}

.help-panel .support-chip {
  display: inline-flex;
  margin-top: 0;
  width: fit-content;
  max-width: 100%;
}

@media (max-width: 560px) {
  .help-panel .contact-text {
    justify-content: center;
  }

  .help-panel .support-chip {
    margin-left: auto;
    margin-right: auto;
  }
}


/* V15 mobile alignment fix */
@media (max-width: 640px) {
  .app-shell {
    width: min(100% - 18px, 520px);
  }

  .app-card {
    padding-bottom: 22px;
  }

  .details-row {
    gap: 16px;
  }

  .info-panel {
    display: grid;
    grid-template-columns: 52px 1fr;
    align-items: start;
    gap: 16px;
    padding: 24px 22px;
  }

  .info-panel .panel-icon {
    width: 48px;
    height: 48px;
    margin-top: 0;
    align-self: start;
  }

  .info-panel > div {
    min-width: 0;
    text-align: left;
  }

  .info-panel h2 {
    margin: 4px 0 14px;
    line-height: 1.2;
    display: flex;
    align-items: center;
    min-height: 32px;
  }

  .help-panel .contact-text {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    width: 100%;
    margin: 0 0 12px;
    text-align: left;
  }

  .help-panel .support-chip {
    margin: 0;
    width: fit-content;
  }

  .security-panel p {
    margin: 0;
    text-align: left;
  }

  .footnote {
    display: none !important;
  }

</head>
<body>
  <div class="backdrop" aria-hidden="true"><i></i><i></i><i></i></div>

  <main class="app-shell">
    <section class="app-card" aria-labelledby="pageTitle">
      <header class="hero">
        <div class="logo" aria-hidden="true">
          <span class="logo-orbit"></span>
          <span class="logo-hand"></span>
        </div>
        <div class="title-wrap">
          <h1 id="pageTitle">谷歌<span>2FA验证码</span>生成器</h1>
          <p>Gmail 邮箱两步验证码在线生成工具</p>
        </div>
      </header>

      <div class="divider"></div>

      <section class="code-area" aria-labelledby="codeHeading">
        <div class="status-pill" id="codeHeading">
          <span class="status-dot" aria-hidden="true"></span>
          <span>当前动态验证码</span>
        </div>

        <div class="code-display" id="codeDisplay" aria-live="polite" aria-atomic="true">
          <span id="codeLeft">---</span>
          <i class="code-separator" aria-hidden="true"></i>
          <span id="codeRight">---</span>
        </div>

        <div class="countdown">
          <div class="timer-ring" id="timerRing" aria-hidden="true"><span id="secondsValue">30</span></div>
          <span>秒后自动刷新</span>
        </div>
        <p class="inline-error" id="inlineError" role="alert" hidden></p>
      </section>

      <div class="action-grid" aria-label="验证码操作">
        <button class="button button-primary" id="copyCode" type="button">
          <span class="icon icon-copy" aria-hidden="true"></span>
          <span class="button-label">复制验证码</span>
        </button>
        <button class="button button-secondary" id="copyLink" type="button">
          <span class="icon icon-link" aria-hidden="true"></span>
          <span class="button-label">复制完整链接</span>
        </button>
        <button class="button button-secondary" id="openSecret" type="button">
          <span class="icon icon-key" aria-hidden="true"></span>
          <span class="button-label">更换密钥</span>
        </button>
      </div>

      <div class="info-grid">
        <article class="info-panel help-panel">
          <span class="panel-icon"><span class="icon icon-help" aria-hidden="true"></span></span>
          <div>
            <h2>需要帮助</h2>
            <p class="contact-text"><span>有使用问题可联系微信：</span></p>
            <button class="support-chip" id="supportButton" type="button">
              <span class="online-dot" aria-hidden="true"></span>
              <span class="button-label">Cedars8</span>
              <span class="icon icon-copy" aria-hidden="true"></span>
            </button>
          </div>
        </article>
        <article class="info-panel security-panel">
          <span class="panel-icon"><span class="icon icon-alert" aria-hidden="true"></span></span>
          <div>
            <h2>账户安全提醒</h2>
            <p>建议<span class="day-emphasis">1天</span>后修改为自己的验证器密钥，<br>以保护账户安全。</p>
          </div>
        </article>
      </div>
    </section>
</main>

  <dialog class="secret-dialog" id="secretDialog" aria-labelledby="dialogTitle">
    <form id="secretForm">
      <header class="dialog-header">
        <span class="dialog-symbol"><span class="icon icon-key" aria-hidden="true"></span></span>
        <div>
          <span>身份验证器设置</span>
          <h2 id="dialogTitle">更换验证密钥</h2>
        </div>
        <button class="close-button" id="closeDialog" type="button" aria-label="关闭">
          <span class="icon icon-x" aria-hidden="true"></span>
        </button>
      </header>
      <label for="secretInput">Base32 密钥或 otpauth:// 链接</label>
      <textarea id="secretInput" rows="4" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="例如：JBSWY3DPEHPK3PXP"></textarea>
      <p class="field-help">支持直接输入密钥，也支持 /密钥、#密钥、?key=密钥 三种链接直达方式。</p>
      <p class="field-error" id="fieldError" role="alert" hidden></p>
      <div class="dialog-actions">
        <button class="button button-secondary" id="cancelDialog" type="button">取消</button>
        <button class="button button-primary" type="submit"><span class="icon icon-check"></span>生成验证码</button>
      </div>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <span class="icon icon-check" aria-hidden="true"></span><span id="toastText"></span>
  </div>

<script>
(function () {
  "use strict";

  var state = {
    secret: "",
    issuer: "Google",
    account: "用户",
    digits: 6,
    period: 30,
    code: "",
    lastCounter: -1
  };

  function $(selector) { return document.querySelector(selector); }

  var dialog = $("#secretDialog");
  var secretInput = $("#secretInput");
  var fieldError = $("#fieldError");
  var toast = $("#toast");
  var toastTimer;

  function base32ToBytes(value) {
    var alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
    var clean = String(value || "").toUpperCase().replace(/[\s=-]/g, "");

    if (!clean) throw new Error("请输入有效的 Base32 密钥");

    var bits = "";
    for (var i = 0; i < clean.length; i += 1) {
      var index = alphabet.indexOf(clean.charAt(i));
      if (index < 0) throw new Error("密钥包含无效字符，只能包含 A-Z 和 2-7");
      bits += index.toString(2).padStart(5, "0");
    }

    var bytes = [];
    for (var bit = 0; bit + 8 <= bits.length; bit += 8) {
      bytes.push(parseInt(bits.slice(bit, bit + 8), 2));
    }

    if (!bytes.length) throw new Error("密钥长度不足");
    return bytes;
  }

  function rotateLeft(value, shift) {
    return (value << shift) | (value >>> (32 - shift));
  }

  function sha1(input) {
    var bytes = input.slice();
    var bitLength = bytes.length * 8;

    bytes.push(128);
    while ((bytes.length % 64) !== 56) bytes.push(0);

    var high = Math.floor(bitLength / 4294967296);
    var low = bitLength >>> 0;

    for (var h = 3; h >= 0; h -= 1) bytes.push((high >>> (h * 8)) & 255);
    for (var l = 3; l >= 0; l -= 1) bytes.push((low >>> (l * 8)) & 255);

    var h0 = 0x67452301;
    var h1 = 0xefcdab89;
    var h2 = 0x98badcfe;
    var h3 = 0x10325476;
    var h4 = 0xc3d2e1f0;
    var words = new Array(80);

    for (var offset = 0; offset < bytes.length; offset += 64) {
      for (var w = 0; w < 16; w += 1) {
        var p = offset + w * 4;
        words[w] = ((bytes[p] << 24) | (bytes[p + 1] << 16) | (bytes[p + 2] << 8) | bytes[p + 3]) | 0;
      }

      for (var next = 16; next < 80; next += 1) {
        words[next] = rotateLeft(words[next - 3] ^ words[next - 8] ^ words[next - 14] ^ words[next - 16], 1);
      }

      var a = h0, b = h1, c = h2, d = h3, e = h4;

      for (var round = 0; round < 80; round += 1) {
        var f;
        var k;

        if (round < 20) {
          f = (b & c) | ((~b) & d);
          k = 0x5a827999;
        } else if (round < 40) {
          f = b ^ c ^ d;
          k = 0x6ed9eba1;
        } else if (round < 60) {
          f = (b & c) | (b & d) | (c & d);
          k = 0x8f1bbcdc;
        } else {
          f = b ^ c ^ d;
          k = 0xca62c1d6;
        }

        var temp = (rotateLeft(a, 5) + f + e + k + words[round]) | 0;
        e = d;
        d = c;
        c = rotateLeft(b, 30);
        b = a;
        a = temp;
      }

      h0 = (h0 + a) | 0;
      h1 = (h1 + b) | 0;
      h2 = (h2 + c) | 0;
      h3 = (h3 + d) | 0;
      h4 = (h4 + e) | 0;
    }

    var output = [];
    [h0, h1, h2, h3, h4].forEach(function (word) {
      output.push(
        (word >>> 24) & 255,
        (word >>> 16) & 255,
        (word >>> 8) & 255,
        word & 255
      );
    });

    return output;
  }

  function hmacSha1(key, message) {
    var normalized = key.length > 64 ? sha1(key) : key.slice();

    while (normalized.length < 64) normalized.push(0);

    var inner = [];
    var outer = [];

    for (var i = 0; i < 64; i += 1) {
      inner.push(normalized[i] ^ 0x36);
      outer.push(normalized[i] ^ 0x5c);
    }

    return sha1(outer.concat(sha1(inner.concat(message))));
  }

  function generateTotp(timestamp) {
    var counter = Math.floor(timestamp / 1000 / state.period);
    var high = Math.floor(counter / 4294967296);
    var low = counter >>> 0;
    var message = [];

    for (var h = 3; h >= 0; h -= 1) message.push((high >>> (h * 8)) & 255);
    for (var l = 3; l >= 0; l -= 1) message.push((low >>> (l * 8)) & 255);

    var digest = hmacSha1(base32ToBytes(state.secret), message);
    var offset = digest[digest.length - 1] & 15;

    var binary = (
      ((digest[offset] & 127) << 24) |
      (digest[offset + 1] << 16) |
      (digest[offset + 2] << 8) |
      digest[offset + 3]
    ) >>> 0;

    return String(binary % Math.pow(10, state.digits)).padStart(state.digits, "0");
  }

  function parseInput(raw) {
    var value = String(raw || "").trim();

    if (!value) throw new Error("请输入密钥或设置链接");

    if (value.toLowerCase().indexOf("otpauth://") !== 0) {
      base32ToBytes(value);

      return {
        secret: value.toUpperCase().replace(/[\s=-]/g, ""),
        issuer: "Google",
        account: "个人账户",
        digits: 6,
        period: 30
      };
    }

    var url;

    try {
      url = new URL(value);
    } catch (error) {
      throw new Error("设置链接格式不正确");
    }

    if (url.hostname.toLowerCase() !== "totp") {
      throw new Error("当前仅支持 TOTP 设置链接");
    }

    var algorithm = String(url.searchParams.get("algorithm") || "SHA1").toUpperCase().replace(/[^A-Z0-9]/g, "");

    if (algorithm !== "SHA1") {
      throw new Error("当前版本仅支持常用的 SHA-1 验证码");
    }

    var secret = url.searchParams.get("secret") || "";

    base32ToBytes(secret);

    var label = decodeURIComponent(url.pathname.replace(/^\//, ""));
    var parts = label.split(":");
    var issuer = url.searchParams.get("issuer") || (parts.length > 1 ? parts[0] : "Google");
    var account = parts.length > 1 ? parts.slice(1).join(":") : label || "个人账户";
    var digits = Number(url.searchParams.get("digits") || 6);
    var period = Number(url.searchParams.get("period") || 30);

    if ([6, 7, 8].indexOf(digits) < 0 || period < 5 || period > 300) {
      throw new Error("验证码位数或刷新周期无效");
    }

    return {
      secret: secret.toUpperCase().replace(/[\s=-]/g, ""),
      issuer: issuer,
      account: account,
      digits: digits,
      period: period
    };
  }

  function getSecretFromUrl() {
    var hashValue = decodeURIComponent((location.hash || "").slice(1).trim());
    if (hashValue) return hashValue;

    var params = new URLSearchParams(location.search);
    var queryValue = params.get("key") || params.get("secret") || params.get("s");
    if (queryValue) return queryValue;

    var pathValue = decodeURIComponent(location.pathname.replace(/^\/+|\/+$/g, "").trim());

    if (
      pathValue &&
      pathValue !== "index.html" &&
      !pathValue.includes(".") &&
      /^[A-Za-z2-7=\-\s]+$/.test(pathValue)
    ) {
      return pathValue;
    }

    return "";
  }

  function renderPlaceholder() {
    $("#codeLeft").textContent = "---";
    $("#codeRight").textContent = "---";
    $("#secondsValue").textContent = String(state.period);
    $("#timerRing").style.setProperty("--progress", 1);
    state.code = "";
    state.lastCounter = -1;
  }

  function isHttpPage() {
    return location.protocol === "http:" || location.protocol === "https:";
  }

  function safeUpdateAddress() {
    if (!state.secret || !isHttpPage()) return;

    try {
      var nextPath = "/" + encodeURIComponent(state.secret.toLowerCase());

      if (location.pathname !== nextPath) {
        history.replaceState(null, "", nextPath);
      }
    } catch (error) {
      // 本地 file:// 预览或部分内置浏览器可能不允许修改地址栏，忽略即可，不影响验证码生成。
    }
  }

  function updateCode() {
    if (!state.secret) {
      renderPlaceholder();
      return;
    }

    var now = Date.now();
    var epoch = Math.floor(now / 1000);
    var cycleMs = state.period * 1000;
    var remainingMs = cycleMs - (now % cycleMs);
    var remaining = Math.ceil(remainingMs / 1000);
    var counter = Math.floor(epoch / state.period);

    $("#secondsValue").textContent = String(remaining);
    $("#timerRing").style.setProperty("--progress", remainingMs / cycleMs);

    if (counter === state.lastCounter) return;

    try {
      state.code = generateTotp(now);
      state.lastCounter = counter;

      var midpoint = Math.ceil(state.code.length / 2);

      $("#codeLeft").textContent = state.code.slice(0, midpoint);
      $("#codeRight").textContent = state.code.slice(midpoint);
      $("#inlineError").hidden = true;
      $("#codeDisplay").classList.remove("is-refreshing");

      setTimeout(function () {
        $("#codeDisplay").classList.add("is-refreshing");
      }, 0);
    } catch (error) {
      $("#inlineError").textContent = error.message || "验证码生成失败";
      $("#inlineError").hidden = false;
    }
  }

  function buildLink() {
    if (!state.secret) return "";

    if (!isHttpPage()) {
      return "";
    }

    return location.origin + "/" + encodeURIComponent(state.secret.toLowerCase());
  }

  function showToast(message) {
    $("#toastText").textContent = message;
    toast.classList.add("is-visible");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toast.classList.remove("is-visible");
    }, 2100);
  }

  function feedback(button, message) {
    var label = button.querySelector(".button-label");
    if (!label) return;

    var original = label.textContent;
    label.textContent = message;
    button.classList.add("is-success");

    setTimeout(function () {
      label.textContent = original;
      button.classList.remove("is-success");
    }, 1600);
  }

  function copyText(text, button, successMessage) {
    if (!text) {
      showToast("请先输入密钥");
      return;
    }

    function success() {
      feedback(button, successMessage);
      showToast(successMessage);
    }

    function fallback() {
      var helper = document.createElement("textarea");
      helper.value = text;
      helper.setAttribute("readonly", "");
      helper.style.position = "fixed";
      helper.style.opacity = "0";

      document.body.appendChild(helper);
      helper.select();

      var copied = false;

      try {
        copied = document.execCommand("copy");
      } catch (error) {
        copied = false;
      }

      document.body.removeChild(helper);

      if (copied) {
        success();
      } else {
        window.prompt("浏览器未允许自动复制，请手动复制：", text);
        showToast("请在弹窗中手动复制");
      }
    }

    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(success).catch(fallback);
    } else {
      fallback();
    }
  }

  function openDialog() {
    secretInput.value = "";
    fieldError.hidden = true;

    if (typeof dialog.showModal === "function") {
      dialog.showModal();
    } else {
      dialog.setAttribute("open", "");
    }

    setTimeout(function () {
      secretInput.focus();
    }, 30);
  }

  function closeDialog() {
    if (typeof dialog.close === "function") {
      dialog.close();
    } else {
      dialog.removeAttribute("open");
    }
  }

  function applySecret(raw, shouldUpdateUrl) {
    var next = parseInput(raw);

    state.secret = next.secret;
    state.issuer = next.issuer;
    state.account = next.account;
    state.digits = next.digits;
    state.period = next.period;
    state.lastCounter = -1;

    updateCode();

    if (shouldUpdateUrl) {
      safeUpdateAddress();
    }
  }

  $("#copyCode").addEventListener("click", function () {
    if (!state.code) {
      showToast("请先输入密钥");
      return;
    }

    copyText(state.code, this, "验证码已复制");
  });

  $("#copyLink").addEventListener("click", function () {
    if (!isHttpPage()) {
      showToast("本地预览无法生成完整链接，上传到 Vercel 后即可使用");
      return;
    }

    copyText(buildLink(), this, "完整链接已复制");
  });

  $("#openSecret").addEventListener("click", openDialog);

  $("#supportButton").addEventListener("click", function () {
    copyText("Cedars8", this, "客服名称已复制");
  });

  $("#closeDialog").addEventListener("click", closeDialog);
  $("#cancelDialog").addEventListener("click", closeDialog);

  dialog.addEventListener("click", function (event) {
    if (event.target === dialog) closeDialog();
  });

  $("#secretForm").addEventListener("submit", function (event) {
    event.preventDefault();

    try {
      applySecret(secretInput.value, true);
      closeDialog();
      showToast("新密钥已生效");
    } catch (error) {
      fieldError.textContent = error.message || "无法识别此密钥";
      fieldError.hidden = false;
      secretInput.focus();
    }
  });

  function animationLoop() {
    updateCode();
    window.requestAnimationFrame(animationLoop);
  }

  function init() {
    var fromUrl = getSecretFromUrl();

    if (fromUrl) {
      try {
        applySecret(fromUrl, true);
      } catch (error) {
        renderPlaceholder();
        $("#inlineError").textContent = error.message || "链接里的密钥格式错误";
        $("#inlineError").hidden = false;
        setTimeout(openDialog, 160);
      }
    } else {
      renderPlaceholder();
      setTimeout(openDialog, 180);
    }

    window.requestAnimationFrame(animationLoop);
  }

  init();
})();

</script>
