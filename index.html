    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%0A%20%20%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2216%22%20fill%3D%22%234F46E5%22/%3E%0A%20%20%3Cpath%20d%3D%22M42%2028h-2v-6c0-5.1-3.9-9-8-9s-8%203.9-8%209v6h-2c-2.2%200-4%201.8-4%204v14c0%202.2%201.8%204%204%204h20c2.2%200%204-1.8%204-4V32c0-2.2-1.8-4-4-4Zm-13%200v-6c0-2.4%201.6-4%203-4s3%201.6%203%204v6h-6Z%22%20fill%3D%22%23fff%22/%3E%0A%20%20%3Ccircle%20cx%3D%2246%22%20cy%3D%2216%22%20r%3D%227%22%20fill%3D%22%23FBBF24%22%20stroke%3D%22%230F172A%22%20stroke-width%3D%223%22/%3E%0A%3C/svg%3E">
    <link rel="shortcut icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%0A%20%20%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2216%22%20fill%3D%22%234F46E5%22/%3E%0A%20%20%3Cpath%20d%3D%22M42%2028h-2v-6c0-5.1-3.9-9-8-9s-8%203.9-8%209v6h-2c-2.2%200-4%201.8-4%204v14c0%202.2%201.8%204%204%204h20c2.2%200%204-1.8%204-4V32c0-2.2-1.8-4-4-4Zm-13%200v-6c0-2.4%201.6-4%203-4s3%201.6%203%204v6h-6Z%22%20fill%3D%22%23fff%22/%3E%0A%20%20%3Ccircle%20cx%3D%2246%22%20cy%3D%2216%22%20r%3D%227%22%20fill%3D%22%23FBBF24%22%20stroke%3D%22%230F172A%22%20stroke-width%3D%223%22/%3E%0A%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4F46E5;
            --secondary: #D946EF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --border-val: #E2E8F0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

        html, body { min-height: 100%; }

        body {
            background-color: #F8FAFC;
            color: var(--text-main);
            font-family: 'Outfit', -apple-system, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden; position: relative;
        }

        /* 高级双层科技网格背景 */
        .advanced-grid {
            position: fixed; inset: 0; z-index: 0;
            background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
            background-image: 
                linear-gradient(to right, rgba(79, 70, 229, 0.06) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(79, 70, 229, 0.06) 1px, transparent 1px),
                linear-gradient(to right, rgba(79, 70, 229, 0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(79, 70, 229, 0.02) 1px, transparent 1px);
            pointer-events: none;
        }

        /* 主面板（等宽等高黄金开阔比例） */
        main {
            position: relative; z-index: 10; 
            width: 92%; max-width: 880px; min-height: 680px; 
            background: #FFFFFF; border: 1px solid var(--border-val); border-radius: 32px; 
            padding: 64px 80px; box-shadow: 0 40px 100px -20px rgba(15, 23, 42, 0.06);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 40px 0;
        }

        /* 四角卡扣科技装饰 */
        .corner-deco { position: absolute; width: 14px; height: 14px; border: 2px solid #CBD5E1; }
        .corner-tl { top: 24px; left: 24px; border-right: none; border-bottom: none; }
        .corner-tr { top: 24px; right: 24px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 24px; left: 24px; border-right: none; border-top: none; }
        .corner-br { bottom: 24px; right: 24px; border-left: none; border-top: none; }

        /* 🦁 扒边小狮子 */
        .privacy-mascot {
            position: absolute; right: -82px; top: 40%;
            width: 100px; height: 140px; z-index: -1; cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        main:hover .privacy-mascot { transform: translate(-30px, -20%) rotate(8deg); }

        .brand-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(79, 70, 229, 0.06); border: 1px solid rgba(79, 70, 229, 0.15);
            padding: 6px 16px; border-radius: 100px;
            color: var(--primary); font-size: 13px; font-weight: 700; letter-spacing: 1px; margin-bottom: 20px;
        }

        /* 渐变标题 */
        h1 { 
            font-weight: 900; font-size: 42px; letter-spacing: -0.5px; margin-bottom: 12px; 
            background: linear-gradient(135deg, #0F172A 0%, #4F46E5 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { font-size: 15px; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 40px; font-weight: 500; }

        /* 验证码数字 */
        .code-display {
            font-family: 'Space Grotesk', monospace; font-size: 114px; font-weight: 700; line-height: 1; letter-spacing: 10px;
            margin-bottom: 32px; display: flex; gap: 24px; color: var(--text-main);
        }

        /* 嵌套同步倒计时 */
        .timer-widget { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 48px; }
        .timer-ring-wrapper { position: relative; width: 36px; height: 36px; display: flex; justify-content: center; align-items: center; }
        .timer-ring { position: absolute; top: 0; left: 0; transform: rotate(-90deg); width: 36px; height: 36px; }
        .timer-ring circle { fill: none; stroke-width: 4; stroke-linecap: round; }
        .timer-ring .ring-bg { stroke: #E2E8F0; }
        .timer-ring .ring-fill { stroke: var(--secondary); transition: stroke-dashoffset 1s linear; }
        .timer-number { position: relative; z-index: 2; font-size: 14px; font-weight: 900; color: var(--secondary); font-family: 'Space Grotesk', monospace; }
        .timer-label { font-size: 15px; color: var(--text-muted); font-weight: 600; }

        /* --- 🛠️ 升级：美式大方齐宽的布局系统 --- */
        .action-layout-container { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 56px; }

        /* 大方的主复制按钮 */
        .btn-primary-centered {
            width: 100%; max-width: 420px; height: 64px;
            background: linear-gradient(90deg, #8B5CF6, #D946EF);
            color: #FFFFFF; border: none; border-radius: 100px;
            font-size: 16px; font-weight: 700; letter-spacing: 1px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            box-shadow: 0 12px 24px -8px rgba(217, 70, 239, 0.4);
            transition: all 0.3s ease; margin-bottom: 16px;
        }
        .btn-primary-centered:hover { transform: translateY(-2px); box-shadow: 0 16px 32px -8px rgba(217, 70, 239, 0.5); }

        /* 已优化：完美与主按钮同齐同宽的次级椭圆按钮 */
        .secondary-actions-group { display: flex; gap: 16px; justify-content: center; width: 100%; max-width: 420px; }
        
        .btn-secondary {
            flex: 1; height: 56px; /* 👈 大尺寸方便点击 */
            background: rgba(15, 23, 42, 0.03); border: 1px solid var(--border-val); border-radius: 100px;
            display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all 0.2s;
        }
        .btn-secondary span {
            font-size: 14px; font-weight: 800;
            background: linear-gradient(135deg, #0F172A 0%, #4F46E5 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .btn-secondary svg { width: 18px; height: 18px; color: #4F46E5; }
        .btn-secondary:hover { background: #FFFFFF; border-color: #A5B4FC; transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.1); }

        /* --- 🎨 升级：一体化横向非对称切割信息底板（美式高级风） --- */
        .premium-info-dashboard {
            display: flex; width: 100%; background: #FFFFFF;
            border: 1px solid var(--border-val); border-radius: 24px;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.02); overflow: hidden;
        }
        
        /* 左侧：支持面板 (占比 46%) */
        .dash-section-help {
            flex: 46; padding: 36px 40px;
            background: linear-gradient(135deg, #FFFFFF 60%, #EFF6FF 100%);
            border-right: 1px solid var(--border-val); /* 中央切割线 */
        }
        
        /* 右侧：安全面板 (占比 54%) */
        .dash-section-alert {
            flex: 54; padding: 36px 40px;
            background: linear-gradient(135deg, #FFFFFF 60%, #FEF2F2 100%);
        }

        .dash-title { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 800; margin-bottom: 14px; }
        .dash-title svg { width: 22px; height: 22px; flex-shrink: 0; }
        .dash-section-help .dash-title { color: #2563EB; }
        .dash-section-alert .dash-title { color: #DC2626; }
        
        .dash-content { font-size: 14px; color: var(--text-muted); line-height: 1.6; font-weight: 500; }

        /* 精致的绿灯指示客服徽章 */
        .wechat-pill-badge {
            display: inline-flex; align-items: center; gap: 8px; margin-top: 14px; padding: 10px 20px;
            background: #FFFFFF; border: 1px solid #BFDBFE; border-radius: 100px;
            color: #1D4ED8; font-weight: 800; font-size: 14px; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.04);
        }
        .wechat-pill-badge:hover { background: #DBEAFE; transform: scale(1.02); }
        
        .status-pulse-dot {
            width: 8px; height: 8px; background-color: #10B981; border-radius: 50%; 
            box-shadow: 0 0 8px #10B981; animation: greenGlow 2s infinite;
        }
        @keyframes greenGlow {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .alert-highlight-tag { color: #DC2626; font-weight: 800; background: #FFFFFF; border: 1px solid #FECACA; padding: 2px 6px; border-radius: 6px; margin: 0 2px; }

        /* 模态弹窗 */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        .modal-box {
            background: #FFFFFF; border-radius: 24px; padding: 40px; width: 90%; max-width: 460px; text-align: left; 
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.3); animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
        .modal-title-group { display: flex; align-items: center; gap: 16px; }
        .modal-icon { width: 48px; height: 48px; background: #EEF2FF; color: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .modal-title-text h3 { font-size: 20px; font-weight: 900; color: var(--text-main); }
        .modal-subtitle { font-size: 11px; color: var(--primary); font-weight: 700; letter-spacing: 0.5px; }
        .modal-close-btn { background: none; border: 1px solid var(--border-val); border-radius: 50%; width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; color: var(--text-muted); cursor: pointer; }

        .modal-body label { display: block; font-size: 14px; font-weight: 800; color: var(--text-main); margin-bottom: 10px; }
        .modal-textarea { width: 100%; height: 110px; resize: none; padding: 16px; background: #F8FAFC; border: 1px solid #CBD5E1; border-radius: 16px; color: var(--text-main); font-family: 'Space Grotesk', monospace; font-size: 15px; font-weight: 600; outline: none; }
        .modal-textarea:focus { border-color: var(--primary); background: #FFFFFF; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .modal-helper { font-size: 13px; color: var(--text-muted); margin-top: 10px; line-height: 1.5; }

        .modal-btns { display: flex; flex-direction: column; gap: 12px; margin-top: 32px; }
        .modal-btns button { width: 100%; padding: 16px; border: none; border-radius: 100px; font-weight: 800; font-size: 16px; cursor: pointer; }
        .btn-save { background: linear-gradient(90deg, #4F46E5, #7C3AED); color: #FFF; box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.3); }
        .btn-cancel { background: #F1F5F9; color: var(--text-muted); }

        @media (max-width: 768px) {
            main { padding: 40px 20px; width: 94%; min-height: auto; margin: 20px auto; }
            h1 { font-size: 32px; }
            .code-display { font-size: 76px; letter-spacing: 4px; gap: 16px; margin-bottom: 24px;}
            .privacy-mascot, .corner-deco { display: none; }
            .secondary-actions-group { flex-direction: column; width: 100%; }
            .btn-secondary { width: 100%; }
            .premium-info-dashboard { flex-direction: column; }
            .dash-section-help { border-right: none; border-bottom: 1px solid var(--border-val); }
            .modal-box { padding: 24px; }
        }

        /* =========================================
           V50 历史细节整合：真实 2FA + 干净按钮 + 移动端优化
           ========================================= */
        .code-display {
            justify-content: center;
            align-items: center;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum" 1;
        }

        .code-display span {
            min-width: 3ch;
            text-align: center;
        }

        .inline-error {
            min-height: 18px;
            margin: -30px 0 32px;
            color: #DC2626;
            font-size: 13px;
            line-height: 1.45;
            text-align: center;
            font-weight: 700;
        }

        .timer-number {
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            white-space: nowrap;
            letter-spacing: -0.3px;
        }

        .timer-label {
            white-space: nowrap;
        }

        button {
            font-family: inherit;
        }

        .btn-primary-centered,
        .btn-secondary,
        .wechat-pill-badge,
        .btn-save,
        .btn-cancel {
            outline: none;
            box-shadow: none !important;
        }

        .btn-primary-centered {
            border: none !important;
            border-radius: 999px !important;
            background: linear-gradient(90deg, #4F46E5, #7C3AED) !important;
        }

        .btn-primary-centered:hover {
            transform: translateY(-1px);
            box-shadow: none !important;
            background: linear-gradient(90deg, #4338CA, #6D28D9) !important;
        }

        .btn-secondary {
            border: 1px solid var(--border-val) !important;
            border-radius: 999px !important;
            background: rgba(15, 23, 42, 0.03) !important;
            box-shadow: none !important;
        }

        .btn-secondary:hover {
            transform: translateY(-1px);
            border-color: #CBD5E1 !important;
            background: #F8FAFC !important;
            box-shadow: none !important;
        }

        .wechat-pill-badge {
            border: 1px solid #BFDBFE !important;
            border-radius: 999px !important;
            box-shadow: none !important;
        }

        .wechat-pill-badge:hover {
            transform: translateY(-1px);
            box-shadow: none !important;
        }

        .status-pulse-dot,
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #10B981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10B981;
            animation: greenGlow 2s infinite;
            flex: none;
        }

        .modal-overlay.show,
        .modal-overlay.active {
            display: flex !important;
        }

        .modal-overlay {
            padding: 18px;
        }

        .modal-box {
            border: 1px solid var(--border-val) !important;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12) !important;
        }

        .modal-error {
            min-height: 18px;
            margin: 10px 0 0;
            color: #DC2626;
            font-size: 13px;
            line-height: 1.45;
            text-align: left;
            font-weight: 700;
        }

        .modal-btns button {
            border-radius: 999px !important;
            box-shadow: none !important;
        }

        .btn-save {
            background: linear-gradient(90deg, #4F46E5, #7C3AED) !important;
        }

        .modal-close-btn {
            box-shadow: none !important;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: max(32px, env(safe-area-inset-bottom));
            z-index: 100000;
            transform: translateX(-50%) translateY(14px);
            opacity: 0;
            pointer-events: none;
            min-height: 42px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            border-radius: 100px;
            background: rgba(15, 23, 42, 0.94);
            color: #FFFFFF;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.4px;
            transition: 0.2s ease;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                padding: 16px;
            }

            main {
                width: 94%;
                min-height: auto;
                margin: 20px auto;
                padding: 40px 20px;
                border-radius: 24px;
            }

            h1 {
                font-size: 32px;
                text-align: center;
            }

            .subtitle {
                text-align: center;
            }

            .code-display {
                font-size: 76px;
                letter-spacing: 4px;
                gap: 16px;
                margin-bottom: 24px;
            }

            .timer-widget {
                margin-bottom: 32px;
                gap: 8px;
            }

            .timer-number {
                font-size: 13px;
            }

            .timer-label {
                font-size: 13px;
            }

            .action-layout-container {
                margin-bottom: 36px;
            }

            .btn-primary-centered {
                max-width: 100%;
                height: 64px;
                margin-bottom: 14px;
            }

            .secondary-actions-group {
                flex-direction: column;
                width: 100%;
                max-width: 100%;
                gap: 14px;
            }

            .btn-secondary {
                width: 100%;
                height: 58px;
                flex: none;
            }

            .btn-secondary span {
                font-size: 15px;
                font-weight: 700;
            }

            .premium-info-dashboard {
                flex-direction: column;
            }

            .dash-section-help {
                border-right: none;
                border-bottom: 1px solid var(--border-val);
            }

            .privacy-mascot,
            .corner-deco {
                display: none;
            }

            .modal-box {
                padding: 24px;
                width: min(92vw, 460px);
            }
        }

        @media (max-width: 420px) {
            body {
                padding: 10px;
            }

            main {
                width: 100%;
                padding: 34px 18px;
            }

            h1 {
                font-size: 30px;
            }

            .subtitle {
                font-size: 12px;
                margin-bottom: 32px;
            }

            .code-display {
                font-size: clamp(54px, 17vw, 68px);
                letter-spacing: 2px;
                gap: 10px;
            }

            .timer-label {
                font-size: 12.5px;
            }

            .timer-number {
                font-size: 12px;
            }

            .btn-primary-centered {
                height: 62px;
                font-size: 15px;
            }

            .btn-secondary {
                height: 56px;
            }

            .dash-section-help,
            .dash-section-alert {
                padding: 26px 20px;
            }
        }


        /* =========================================
           V51 高级工具条 + 安全支持面板
           ========================================= */
        .action-layout-v51 {
            margin-bottom: 46px !important;
        }

        .btn-primary-centered {
            width: 100% !important;
            max-width: 420px !important;
            height: 64px !important;
            border: none !important;
            border-radius: 999px !important;
            background: linear-gradient(90deg, #4F46E5 0%, #7C3AED 100%) !important;
            box-shadow: 0 18px 42px -30px rgba(79, 70, 229, 0.55) !important;
        }

        .btn-primary-centered:hover,
        .btn-primary-centered:active {
            box-shadow: 0 18px 42px -30px rgba(79, 70, 229, 0.55) !important;
            transform: translateY(-1px);
        }

        .utility-dock {
            width: 100%;
            max-width: 420px;
            height: 58px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border: 1px solid rgba(226, 232, 240, 0.95);
            border-radius: 999px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.88), rgba(248,250,252,0.92));
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.85),
                0 14px 34px -30px rgba(15, 23, 42, 0.45);
            padding: 4px;
            overflow: hidden;
        }

        .utility-action {
            height: 100%;
            min-width: 0;
            border: none;
            background: transparent;

            throw new Error("密钥包含无效字符，只能包含 A-Z 和 2-7");
          }

        var h1 = 0xefcdab89;
        var h2 = 0x98badcfe;
        var h3 = 0x10325476;
        var h4 = 0xc3d2e1f0;
        var words = new Array(80);

        for (var offset = 0; offset < bytes.length; offset += 64) {
          for (var w = 0; w < 16; w += 1) {
            var p = offset + w * 4;
            words[w] = ((bytes[p] << 24) | (bytes[p + 1] << 16) | (bytes[p + 2] << 8) | bytes[p + 3]) | 0;
          }

          for (var next = 16; next < 80; next += 1) {
            words[next] = rotateLeft(words[next - 3] ^ words[next - 8] ^ words[next - 14] ^ words[next - 16], 1);
          }

          var a = h0;
          var b = h1;
          var c = h2;
          var d = h3;
          var e = h4;

          for (var round = 0; round < 80; round += 1) {
            var f;
            var k;

            if (round < 20) {
              f = (b & c) | ((~b) & d);
              k = 0x5a827999;
            } else if (round < 40) {
              f = b ^ c ^ d;
              k = 0x6ed9eba1;
            } else if (round < 60) {
              f = (b & c) | (b & d) | (c & d);
              k = 0x8f1bbcdc;
            } else {
              f = b ^ c ^ d;
              k = 0xca62c1d6;
            }

            var temp = (rotateLeft(a, 5) + f + e + k + words[round]) | 0;
            e = d;
            d = c;
            c = rotateLeft(b, 30);
            b = a;
            a = temp;
          }

          h0 = (h0 + a) | 0;
          h1 = (h1 + b) | 0;
          h2 = (h2 + c) | 0;
          h3 = (h3 + d) | 0;
          h4 = (h4 + e) | 0;
        }

        var output = [];

        [h0, h1, h2, h3, h4].forEach(function (word) {
          output.push(
            (word >>> 24) & 255,
            (word >>> 16) & 255,
            (word >>> 8) & 255,
            word & 255
          );
        });

        return output;
      }

      function hmacSha1(key, message) {
        var normalized = key.length > 64 ? sha1(key) : key.slice();

        while (normalized.length < 64) {
          normalized.push(0);
        }

        var inner = [];
        var outer = [];

        for (var i = 0; i < 64; i += 1) {
          inner.push(normalized[i] ^ 0x36);
          outer.push(normalized[i] ^ 0x5c);
        }

        return sha1(outer.concat(sha1(inner.concat(message))));
      }

      function generateTotp(timestamp) {
        var counter = Math.floor(timestamp / 1000 / state.period);
        var high = Math.floor(counter / 4294967296);
        var low = counter >>> 0;
        var message = [];

        for (var h = 3; h >= 0; h -= 1) {
          message.push((high >>> (h * 8)) & 255);
        }

        for (var l = 3; l >= 0; l -= 1) {
          message.push((low >>> (l * 8)) & 255);
        }

        var digest = hmacSha1(base32ToBytes(state.secret), message);
        var offset = digest[digest.length - 1] & 15;

        var binary = (
          ((digest[offset] & 127) << 24) |
          (digest[offset + 1] << 16) |
          (digest[offset + 2] << 8) |
          digest[offset + 3]
        ) >>> 0;

        return String(binary % Math.pow(10, state.digits)).padStart(state.digits, "0");
      }

      function parseInput(raw) {
        var value = String(raw || "").trim();

        if (!value) {
          throw new Error("请输入密钥或设置链接");
        }

        if (value.toLowerCase().indexOf("otpauth://") !== 0) {
          base32ToBytes(value);

          return {
            secret: value.toUpperCase().replace(/[\s=-]/g, ""),
            digits: 6,
            period: 30
          };
        }

        var url;

        try {
          url = new URL(value);
        } catch (error) {
          throw new Error("设置链接格式不正确");
        }

        if (url.hostname.toLowerCase() !== "totp") {
          throw new Error("当前仅支持 TOTP 设置链接");
        }

        var algorithm = String(url.searchParams.get("algorithm") || "SHA1").toUpperCase().replace(/[^A-Z0-9]/g, "");

        if (algorithm !== "SHA1") {
          throw new Error("当前版本仅支持常用的 SHA-1 验证码");
        }

        var secret = url.searchParams.get("secret") || "";
        base32ToBytes(secret);

        var digits = Number(url.searchParams.get("digits") || 6);
        var period = Number(url.searchParams.get("period") || 30);

        if ([6, 7, 8].indexOf(digits) < 0 || period < 5 || period > 300) {
          throw new Error("验证码位数或刷新周期无效");
        }

        return {
          secret: secret.toUpperCase().replace(/[\s=-]/g, ""),
          digits: digits,
          period: period
        };
      }

      function getSecretFromUrl() {
        var hashValue = decodeURIComponent((location.hash || "").slice(1).trim());

        if (hashValue) {
          return hashValue;
        }

        var params = new URLSearchParams(location.search);
        var queryValue = params.get("key") || params.get("secret") || params.get("s");

        if (queryValue) {
          return queryValue;
        }

        var pathValue = decodeURIComponent(location.pathname.replace(/^\/+|\/+$/g, "").trim());

        if (
          pathValue &&
          pathValue !== "index.html" &&
          !pathValue.includes(".") &&
          /^[A-Za-z2-7=\-\s]+$/.test(pathValue)
        ) {
          return pathValue;
        }

        return "";
      }

      function isHttpPage() {
        return location.protocol === "http:" || location.protocol === "https:";
      }

      function safeUpdateAddress() {
        if (!state.secret || !isHttpPage()) {
          return;
        }

        try {
          var nextPath = "/" + encodeURIComponent(state.secret.toLowerCase());

          if (location.pathname !== nextPath) {
            history.replaceState(null, "", nextPath);
          }
        } catch (error) {
          // 本地 file:// 预览或部分内置浏览器可能不允许修改地址栏，忽略即可。
        }
      }

      function setupRing() {
        var ring = $("#timerRing");

        if (!ring) {
          return;
        }

        ring.style.strokeDasharray = ringLength + " " + ringLength;
        ring.style.strokeDashoffset = "0";
      }

      function renderPlaceholder() {
        $("#codeLeft").textContent = "---";
        $("#codeRight").textContent = "---";
        $("#countdownNum").textContent = String(state.period);
        var ring = $("#timerRing");

        if (ring) {
          ring.style.strokeDashoffset = "0";
        }

        state.code = "";
        state.lastCounter = -1;
      }

      function updateCode() {
        if (!state.secret) {
          renderPlaceholder();
          return;
        }

        var now = Date.now();
        var epoch = Math.floor(now / 1000);
        var cycleMs = state.period * 1000;
        var remainingMs = cycleMs - (now % cycleMs);
        var remaining = Math.ceil(remainingMs / 1000);
        var counter = Math.floor(epoch / state.period);
        var progress = remainingMs / cycleMs;
        var ring = $("#timerRing");

        $("#countdownNum").textContent = String(remaining);

        if (ring) {
          ring.style.strokeDashoffset = String(ringLength * (1 - progress));
        }

        if (counter === state.lastCounter) {
          return;
        }

        try {
          state.code = generateTotp(now);
          state.lastCounter = counter;

          var midpoint = Math.ceil(state.code.length / 2);

          $("#codeLeft").textContent = state.code.slice(0, midpoint);
          $("#codeRight").textContent = state.code.slice(midpoint);
          $("#inlineError").hidden = true;
        } catch (error) {
          $("#inlineError").textContent = error.message || "验证码生成失败";
          $("#inlineError").hidden = false;
        }
      }

      function buildLink() {
        if (!state.secret || !isHttpPage()) {
          return "";
        }

        return location.origin + "/" + encodeURIComponent(state.secret.toLowerCase());
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");

        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () {
          toast.classList.remove("show");
        }, 1700);
      }

      function feedback(button, message) {
        var label = button.querySelector(".button-label");

        if (!label) {
          return;
        }

        var old = label.textContent;
        label.textContent = message;

        setTimeout(function () {
          label.textContent = old;
        }, 1500);
      }

      function copyText(text, button, successMessage) {
        if (!text) {
          showToast("请先输入密钥");
          return;
        }

        function success() {
          if (button) {
            feedback(button, successMessage);
          }

          showToast(successMessage);
        }

        function fallback() {
          var helper = document.createElement("textarea");
          helper.value = text;
          helper.setAttribute("readonly", "");
          helper.style.position = "fixed";
          helper.style.opacity = "0";

          document.body.appendChild(helper);
          helper.select();

          try {
            document.execCommand("copy");
            success();
          } catch (error) {
            window.prompt("浏览器未允许自动复制，请手动复制：", text);
          }

          helper.remove();
        }

        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text).then(success).catch(fallback);
        } else {
          fallback();
        }
      }

      function openModal() {
        secretInput.value = "";
        fieldError.hidden = true;
        modal.classList.add("show");
        modal.classList.add("active");

        setTimeout(function () {
          secretInput.focus();
        }, 60);
      }

      function closeModal() {
        modal.classList.remove("show");
        modal.classList.remove("active");
      }

      function applySecret(raw, shouldUpdateUrl) {
        var next = parseInput(raw);

        state.secret = next.secret;
        state.digits = next.digits;
        state.period = next.period;
        state.lastCounter = -1;

        updateCode();

        if (shouldUpdateUrl) {
          safeUpdateAddress();
        }
      }

      $("#copyCode").addEventListener("click", function () {
        if (!state.code) {
          showToast("请先输入密钥");
          return;
        }

        copyText(state.code, this, "验证码已复制");
      });

      $("#copyLink").addEventListener("click", function () {
        if (!isHttpPage()) {
          showToast("本地预览无法复制完整链接，上传到 Vercel 后即可使用");
          return;
        }

        copyText(buildLink(), this, "完整链接已复制");
      });

      $("#openSecret").addEventListener("click", openModal);
      $("#closeDialog").addEventListener("click", closeModal);
      $("#cancelDialog").addEventListener("click", closeModal);

      $("#supportButton").addEventListener("click", function () {
        copyText("Cedars8", this, "微信已复制");
      });

      modal.addEventListener("click", function (event) {
        if (event.target === modal) {
          closeModal();
        }
      });

      $("#secretForm").addEventListener("submit", function (event) {
        event.preventDefault();

        try {
          applySecret(secretInput.value, true);
          closeModal();
          showToast("新密钥已生效");
        } catch (error) {
          fieldError.textContent = error.message || "无法识别此密钥";
          fieldError.hidden = false;
          secretInput.focus();
        }
      });

      window.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && (modal.classList.contains("show") || modal.classList.contains("active"))) {
          closeModal();
        }
      });

      (function init() {
        setupRing();

        var fromUrl = getSecretFromUrl();

        if (fromUrl) {
          try {
            applySecret(fromUrl, true);
          } catch (error) {
            renderPlaceholder();
            $("#inlineError").textContent = error.message || "链接里的密钥格式错误";
            $("#inlineError").hidden = false;
            setTimeout(openModal, 150);
          }
        } else {
          renderPlaceholder();
          setTimeout(openModal, 180);
        }

        setInterval(updateCode, 250);
      })();
    })();
  </script>
</body>
</html>
