<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#7457f5">
  <meta name="description" content="在浏览器本地生成兼容 Google 身份验证器的动态验证码">
  <title>谷歌 2FA 验证码生成器</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="stylesheet" href="./styles.css">
  <script defer src="./app.js"></script>
</head>
<body>
  <div class="backdrop" aria-hidden="true"><i></i><i></i><i></i></div>

  <main class="app-shell">
    <section class="app-card" aria-labelledby="pageTitle">
      <header class="hero">
        <div class="logo" aria-hidden="true">
          <span class="logo-orbit"></span>
          <span class="logo-hand"></span>
        </div>
        <div class="title-wrap">
          <h1 id="pageTitle">谷歌<span>2FA验证码</span>生成器</h1>
          <p>Gmail 邮箱两步验证码在线生成工具</p>
        </div>
      </header>

      <div class="divider"></div>

      <section class="code-area" aria-labelledby="codeHeading">
        <div class="status-pill" id="codeHeading">
          <span class="status-dot" aria-hidden="true"></span>
          <span>当前动态验证码</span>
        </div>

        <div class="code-display" id="codeDisplay" aria-live="polite" aria-atomic="true">
          <span id="codeLeft">000</span>
          <i class="code-separator" aria-hidden="true"></i>
          <span id="codeRight">000</span>
        </div>

        <div class="countdown">
          <div class="timer-ring" id="timerRing" aria-hidden="true"><span id="secondsValue">30</span></div>
          <span>秒后自动刷新</span>
        </div>
        <p class="inline-error" id="inlineError" role="alert" hidden></p>
      </section>

      <div class="action-grid" aria-label="验证码操作">
        <button class="button button-primary" id="copyCode" type="button">
          <span class="icon icon-copy" aria-hidden="true"></span>
          <span class="button-label">复制验证码</span>
        </button>
        <button class="button button-secondary" id="copyLink" type="button">
          <span class="icon icon-link" aria-hidden="true"></span>
          <span class="button-label">复制完整链接</span>
        </button>
        <button class="button button-secondary" id="openSecret" type="button">
          <span class="icon icon-key" aria-hidden="true"></span>
          <span class="button-label">更换密钥</span>
        </button>
      </div>

      <div class="info-grid">
        <article class="info-panel help-panel">
          <span class="panel-icon"><span class="icon icon-help" aria-hidden="true"></span></span>
          <div>
            <h2>需要帮助</h2>
            <p>如有使用问题，请联系客户支持。</p>
            <button class="support-chip" id="supportButton" type="button">
              <span class="online-dot" aria-hidden="true"></span>
              <span class="button-label">Cedars8</span>
              <span class="icon icon-copy" aria-hidden="true"></span>
            </button>
          </div>
        </article>
        <article class="info-panel security-panel">
          <span class="panel-icon"><span class="icon icon-alert" aria-hidden="true"></span></span>
          <div>
            <h2>账户安全提醒</h2>
            <p>建议<span class="day-emphasis">1天</span>后修改为自己的密钥，<br>以保护账户安全。</p>
          </div>
        </article>
      </div>
    </section>
    <p class="footnote"><span class="icon icon-lock" aria-hidden="true"></span>兼容标准 TOTP 服务 · 密钥不会上传或保存</p>
  </main>

  <dialog class="secret-dialog" id="secretDialog" aria-labelledby="dialogTitle">
    <form id="secretForm">
      <header class="dialog-header">
        <span class="dialog-symbol"><span class="icon icon-key" aria-hidden="true"></span></span>
        <div>
          <span>身份验证器设置</span>
          <h2 id="dialogTitle">更换验证密钥</h2>
        </div>
        <button class="close-button" id="closeDialog" type="button" aria-label="关闭">
          <span class="icon icon-x" aria-hidden="true"></span>
        </button>
      </header>
      <label for="secretInput">Base32 密钥或 otpauth:// 链接</label>
      <textarea id="secretInput" rows="4" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="例如：JBSWY3DPEHPK3PXP"></textarea>
      <p class="field-help">密钥只用于当前页面的验证码计算，刷新或关闭页面后即清除。</p>
      <p class="field-error" id="fieldError" role="alert" hidden></p>
      <div class="dialog-actions">
        <button class="button button-secondary" id="cancelDialog" type="button">取消</button>
        <button class="button button-primary" type="submit"><span class="icon icon-check"></span>生成验证码</button>
      </div>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <span class="icon icon-check" aria-hidden="true"></span><span id="toastText"></span>
  </div>
</body>
</html>
