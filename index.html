<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FAF9F5">
    <title>谷歌账号2FA验证器</title>
    <meta name="application-name" content="谷歌账号2FA验证器" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%0A%20%20%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2216%22%20fill%3D%22%234F46E5%22/%3E%0A%20%20%3Cpath%20d%3D%22M42%2028h-2v-6c0-5.1-3.9-9-8-9s-8%203.9-8%209v6h-2c-2.2%200-4%201.8-4%204v14c0%202.2%201.8%204%204%204h20c2.2%200%204-1.8%204-4V32c0-2.2-1.8-4-4-4Zm-13%200v-6c0-2.4%201.6-4%203-4s3%201.6%203%204v6h-6Z%22%20fill%3D%22%23fff%22/%3E%0A%20%20%3Ccircle%20cx%3D%2246%22%20cy%3D%2216%22%20r%3D%227%22%20fill%3D%22%23FBBF24%22%20stroke%3D%22%230F172A%22%20stroke-width%3D%223%22/%3E%0A%3C/svg%3E" />
    <link rel="shortcut icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%0A%20%20%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2216%22%20fill%3D%22%234F46E5%22/%3E%0A%20%20%3Cpath%20d%3D%22M42%2028h-2v-6c0-5.1-3.9-9-8-9s-8%203.9-8%209v6h-2c-2.2%200-4%201.8-4%204v14c0%202.2%201.8%204%204%204h20c2.2%200%204-1.8%204-4V32c0-2.2-1.8-4-4-4Zm-13%200v-6c0-2.4%201.6-4%203-4s3%201.6%203%204v6h-6Z%22%20fill%3D%22%23fff%22/%3E%0A%20%20%3Ccircle%20cx%3D%2246%22%20cy%3D%2216%22%20r%3D%227%22%20fill%3D%22%23FBBF24%22%20stroke%3D%22%230F172A%22%20stroke-width%3D%223%22/%3E%0A%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 全局变量与波普艺术风格基调 --- */
        :root {
            --primary: #4F46E5;
            --secondary: #D946EF;
            --pop-yellow: #FBBF24;
            --pop-blue: #3B82F6;
            --pop-pink: #EC4899;
            --stroke-black: #0F172A; /* 3px 强硬度黑描边 */
            --bg-color: #FAF9F5; 
            --text-main: #0F172A;
            --text-muted: #64748B;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

        html, body { min-height: 100%; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', -apple-system, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- 🎨 1. 外围背景丰富设计（不单调的科技网格+艺术几何） --- */
        .advanced-grid {
            position: fixed; inset: 0; z-index: 0;
            background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
            background-image: 
                linear-gradient(to right, rgba(15, 23, 42, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(15, 23, 42, 0.05) 1px, transparent 1px),
                linear-gradient(to right, rgba(15, 23, 42, 0.01) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(15, 23, 42, 0.01) 1px, transparent 1px);
            pointer-events: none;
        }

        /* 外部大区域装饰件 */
        .outer-deco {
            position: absolute; z-index: 0; pointer-events: none;
            border: 3px solid var(--stroke-black);
            animation: floatingDeco 6s infinite alternate ease-in-out;
        }
        .out-square { width: 36px; height: 36px; background: var(--pop-pink); top: 15%; left: 6%; transform: rotate(15deg); box-shadow: 4px 4px 0 var(--stroke-black); }
        .out-circle { width: 44px; height: 44px; background: var(--pop-yellow); border-radius: 50%; bottom: 15%; left: 5%; box-shadow: -4px 4px 0 var(--stroke-black); animation-delay: -2s;}
        .out-triangle { width: 40px; height: 40px; background: var(--pop-blue); top: 18%; right: 6%; transform: rotate(-20deg); box-shadow: 4px 4px 0 var(--stroke-black); animation-delay: -4s;}
        
        @keyframes floatingDeco {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-15px) rotate(10deg); }
        }

        /* --- 📦 2. 完美保留：大方宽敞的主内容板（加入黑粗边） --- */
        main {
            position: relative; z-index: 10; 
            width: 92%; max-width: 900px; min-height: 680px; /* 严格维持原本的大气黄金比例 */
            background: #FFFFFF;
            border: 3px solid var(--stroke-black); /* 👈 引入黑粗线 */
            border-radius: 32px; 
            padding: 64px 72px; 
            box-shadow: 12px 12px 0 rgba(15, 23, 42, 0.04);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 40px 0;
        }

        /* --- 🎨 3. 纯增：内容版块内部的彩色波普几何块（参考图三完美丰富内页） --- */
        .inner-pop-shape {
            position: absolute; z-index: 1; pointer-events: none;
            border: 3px solid var(--stroke-black);
        }
        /* 压在验证码左上角的红色倾斜方块 */
        .inner-shape-rect {
            width: 34px; height: 34px; background-color: var(--pop-pink);
            top: 215px; left: 160px; transform: rotate(-12deg);
            box-shadow: 3px 3px 0 var(--stroke-black);
        }
        /* 垫在验证码右下角的黄色正圆饼 */
        .inner-shape-circle {
            width: 68px; height: 68px; background-color: var(--pop-yellow);
            border-radius: 50%; top: 260px; right: 140px;
            box-shadow: -4px 4px 0 var(--stroke-black);
        }
        /* 装饰用的蓝色小原点 */
        .inner-shape-dot {
            width: 14px; height: 14px; background-color: var(--pop-blue);
            border-radius: 50%; top: 155px; left: 95px;
        }

        /* 四角卡扣 */
        .corner-deco {
            position: absolute; width: 24px; height: 24px;
            border: 3px solid var(--stroke-black); background: var(--bg-color);
        }
        .corner-tl { top: -12px; left: -12px; border-radius: 6px; }
        .corner-tr { top: -12px; right: -12px; border-radius: 6px; }
        .corner-bl { bottom: -12px; left: -12px; border-radius: 6px; }
        .corner-br { bottom: -12px; right: -12px; border-radius: 6px; }

        /* 🦁 扒边小狮子 */
        .privacy-mascot {
            position: absolute; right: -82px; top: 40%;
            width: 100px; height: 140px; z-index: -1; cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        main:hover .privacy-mascot { transform: translate(-30px, -20%) rotate(8deg); }

        .brand-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: linear-gradient(90deg, #4F46E5, #D946EF);
            padding: 8px 18px; border: 3px solid var(--stroke-black); border-radius: 100px;
            color: #FFFFFF; font-size: 13px; font-weight: 700; letter-spacing: 1px;
            margin-bottom: 20px; box-shadow: 4px 4px 0 var(--stroke-black);
            position: relative; z-index: 5;
        }

        /* 渐变高定标题 */
        h1 { 
            font-weight: 900; font-size: 44px; letter-spacing: 1px; margin-bottom: 12px; 
            background: linear-gradient(135deg, #0F172A 0%, #4F46E5 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            position: relative; z-index: 5;
        }
        .subtitle { font-size: 15px; color: var(--text-muted); letter-spacing: 1.5px; margin-bottom: 40px; font-weight: 700; position: relative; z-index: 5; }

        /* 验证码数字区域 (确保盖在几何图形上方) */
        .code-display {
            font-family: 'Space Grotesk', monospace;
            font-size: 110px; font-weight: 700; line-height: 1; letter-spacing: 12px;
            margin-bottom: 32px; display: flex; gap: 24px;
            position: relative; z-index: 5; /* 👈 关键：确保数字始终浮在方块和圆饼前面，不遮挡阅读 */
        }
        .code-display span {
            background: linear-gradient(135deg, #0F172A 0%, #4F46E5 50%, #D946EF 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 居中倒计时组件 */
        .timer-widget {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-bottom: 42px; position: relative; z-index: 5;
        }
        .timer-ring-wrapper { 
            position: relative; width: 36px; height: 36px; 
            display: flex; justify-content: center; align-items: center;
        }
        .timer-ring { position: absolute; top: 0; left: 0; transform: rotate(-90deg); width: 36px; height: 36px; }
        .timer-ring circle { fill: none; stroke-width: 4; stroke-linecap: round; }
        .timer-ring .ring-bg { stroke: #E2E8F0; }
        .timer-ring .ring-fill { stroke: var(--secondary); transition: stroke-dashoffset 1s linear; }
        .timer-number {
            position: relative; z-index: 2; font-size: 15px; font-weight: 900; color: var(--secondary); font-family: 'Space Grotesk', monospace;
        }
        .timer-label { font-size: 15px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; }

        /* --- 🛠️ 严格保留：完全未缩水、开阔大方、极其易点击的按钮系统（加上黑描边） --- */
        .action-layout-container { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 56px; position: relative; z-index: 5; }

        /* 宽大、舒适的椭圆主复制按钮 */
        .btn-primary-centered {
            width: 100%; max-width: 420px;  /* 👈 完美保留最舒适的点击宽度 */
            height: 64px;
            background: linear-gradient(90deg, #8B5CF6, #D946EF);
            color: #FFFFFF; border: 3px solid var(--stroke-black); border-radius: 100px; /* 👈 椭圆粗黑边 */
            font-size: 16px; font-weight: 700; letter-spacing: 1px; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; gap: 12px;
            box-shadow: 4px 5px 0 var(--stroke-black); /* 立体实心阴影 */
            transition: all 0.2s ease; margin-bottom: 18px;
        }
        .btn-primary-centered:hover { transform: translate(-2px, -2px); box-shadow: 6px 7px 0 var(--stroke-black); }
        .btn-primary-centered:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--stroke-black); }

        /* 完全同宽、平分对齐的次级大按钮 */
        .secondary-actions-group { display: flex; gap: 16px; justify-content: center; width: 100%; max-width: 420px; }
        
        .btn-secondary {
            flex: 1; height: 58px; /* 👈 保持大尺寸，绝不缩水变小 */
            background: rgba(15, 23, 42, 0.02); 
            border: 3px solid var(--stroke-black); border-radius: 100px; /* 👈 椭圆粗黑边 */
            display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
            box-shadow: 4px 4px 0 var(--stroke-black); transition: all 0.2s;
        }
        .btn-secondary span {
            font-size: 14px; font-weight: 800;
            background: linear-gradient(135deg, #0F172A 0%, #4F46E5 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .btn-secondary svg { width: 18px; height: 18px; color: #4F46E5; }
        .btn-secondary:hover { background: rgba(15, 23, 42, 0.05); transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--stroke-black); }
        .btn-secondary:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--stroke-black); }

        /* --- 🎨 带有丰富色彩渐变与黑线框的底部卡片 --- */
        .info-cards-grid { display: flex; width: 100%; gap: 24px; position: relative; z-index: 5; }
        
        .card-wrapper {
            flex: 1; border-radius: 20px; padding: 36px 32px; display: flex; flex-direction: column;
            border: 3px solid var(--stroke-black); /* 👈 强效粗黑框定义 */
            box-shadow: 5px 6px 0 rgba(15, 23, 42, 0.03); transition: all 0.3s ease;
        }
        .help-card-style { background: linear-gradient(135deg, #FFFFFF 50%, #EFF6FF 100%); }
        .alert-card-style { background: linear-gradient(135deg, #FFFFFF 50%, #FEF2F2 100%); }
        .card-wrapper:hover { transform: translateY(-4px); box-shadow: 8px 10px 0 rgba(15, 23, 42, 0.06); }

        .card-title-bar { display: flex; align-items: flex-start; gap: 10px; font-size: 16px; font-weight: 800; margin-bottom: 16px; }
        .card-title-bar svg { flex-shrink: 0; width: 22px; height: 22px; }
        .help-card-style .card-title-bar { color: #2563EB; }
        .alert-card-style .card-title-bar { color: #DC2626; }
        
        .card-text-body { font-size: 14px; color: var(--text-muted); line-height: 1.7; font-weight: 700; }

        /* 带绿光指示灯的椭圆客服徽章 */
        .wechat-badge {
            display: inline-flex; align-items: center; gap: 8px; margin-top: 16px; padding: 10px 20px;
            background: #FFFFFF; border: 3px solid var(--stroke-black); border-radius: 100px;
            color: #1D4ED8; font-weight: 800; font-size: 14px; cursor: pointer; transition: all 0.2s;
            box-shadow: 3px 3px 0 var(--stroke-black);
        }
        .wechat-badge:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--stroke-black); }
        
        .status-dot {
            width: 8px; height: 8px; background-color: #10B981; border-radius: 50%; 
            box-shadow: 0 0 8px #10B981; animation: pulseGreen 2s infinite;
        }
        @keyframes pulseGreen {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        .alert-highlight { color: #DC2626; font-weight: 700; background: #FFFFFF; border: 2px solid var(--stroke-black); padding: 3px 8px; border-radius: 6px; }

        /* --- 大号密钥更换居中弹窗 --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 9999;
        }
        .modal-box {
            background: #FFFFFF; border: 3px solid var(--stroke-black); border-radius: 24px; padding: 32px 40px; 
            width: 90%; max-width: 480px; text-align: left; box-shadow: 10px 12px 0 var(--stroke-black);
            animation: modalFadeIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalFadeIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
        .modal-title-group { display: flex; align-items: center; gap: 16px; }
        .modal-icon {
            width: 48px; height: 48px; background: #4F46E5; color: white; border: 3px solid var(--stroke-black);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
        }
        .modal-title-text h3 { font-size: 22px; font-weight: 900; color: var(--text-main); margin-top: 4px; }
        .modal-subtitle { font-size: 12px; color: var(--primary); font-weight: 700; letter-spacing: 1px; }
        
        .modal-close-btn {
            background: none; border: 3px solid var(--stroke-black); border-radius: 50%; width: 36px; height: 36px;
            display: flex; justify-content: center; align-items: center; color: var(--text-main); cursor: pointer;
        }

        .modal-body label { display: block; font-size: 14px; font-weight: 800; color: var(--text-main); margin-bottom: 12px; }
        .modal-textarea {
            width: 100%; height: 120px; resize: none; padding: 16px; background: #F8FAFC; border: 3px solid var(--stroke-black);
            border-radius: 16px; color: var(--text-main); font-family: 'Space Grotesk', monospace; font-size: 15px; font-weight: 600; outline: none;
        }
        .modal-textarea:focus { border-color: var(--primary); background: #FFFFFF; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }
        .modal-helper { font-size: 13px; color: var(--text-muted); margin-top: 12px; line-height: 1.6; font-weight: 700; }

        .modal-btns { display: flex; flex-direction: column; gap: 12px; margin-top: 32px; }
        .modal-btns button {
            width: 100%; padding: 16px; border: 3px solid var(--stroke-black); border-radius: 100px;
            font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        .btn-save { background: linear-gradient(90deg, #4F46E5, #7C3AED); color: #FFF; box-shadow: 3px 4px 0 var(--stroke-black); }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 5px 6px 0 var(--stroke-black); }
        .btn-cancel { background: #FFFFFF; color: var(--text-muted); }


        .code-display {
            justify-content: center;
            align-items: center;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum" 1;
        }

        .code-display span {
            min-width: 3ch;
            text-align: center;
        }

        .inline-error {
            min-height: 18px;
            margin: -24px 0 28px;
            color: #DC2626;
            font-size: 13px;
            line-height: 1.45;
            text-align: center;
            font-weight: 900;
            position: relative;
            z-index: 5;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-error {
            min-height: 18px;
            margin: 10px 0 0;
            color: #DC2626;
            font-size: 13px;
            line-height: 1.45;
            text-align: left;
            font-weight: 900;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: max(32px, env(safe-area-inset-bottom));
            z-index: 10000;
            transform: translateX(-50%) translateY(14px);
            opacity: 0;
            pointer-events: none;
            min-height: 42px;
            padding: 0 18px;
            display: flex;
            align-items: center;
            border-radius: 100px;
            background: #0F172A;
            border: 3px solid #0F172A;
            color: #FFFFFF;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0.5px;
            transition: 0.2s ease;
            box-shadow: 4px 4px 0 rgba(15, 23, 42, 0.18);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 420px) {
            body { padding: 10px; }
            main { width: 100%; padding: 34px 18px; }
            h1 { font-size: 30px; }
            .subtitle { font-size: 12px; }
            .brand-badge { font-size: 12px; }
            .code-display { font-size: clamp(54px, 17vw, 68px); letter-spacing: 2px; gap: 10px; }
            .timer-label { font-size: 13px; }
            .card-wrapper { padding: 26px 20px; }
        }

        /* =========================================
           📱 移动端自适应（保证大按钮，不折行）
           ========================================= */
        @media (max-width: 768px) {
            main { padding: 40px 24px; width: 92%; min-height: auto; margin: 20px auto; }
            h1 { font-size: 32px; }
            /* 智能放大手机端验证码数字，拒绝窄条感 */
            .code-display { font-size: 76px; letter-spacing: 4px; gap: 16px; margin-bottom: 24px;}
            .info-cards-grid { flex-direction: column; }
            .privacy-mascot, .corner-deco, .outer-deco, .inner-pop-shape { display: none; } /* 移动端屏蔽点缀，确保布局安全 */
            .secondary-actions-group { flex-direction: column; width: 100%; }
            .btn-secondary { width: 100%; }
            .modal-box { padding: 24px; }
        }

        /* =========================================
           📱 V41 手机端按钮修复：次级按钮改成图二大胶囊效果
           ========================================= */
        @media (max-width: 768px) {
            .action-layout-container {
                width: 100%;
                margin-bottom: 56px;
            }

            .btn-primary-centered {
                width: 100%;
                max-width: 100%;
                height: 76px;
                border-radius: 999px;
                border: none;
                box-shadow: 0 18px 36px -16px rgba(217, 70, 239, 0.45);
                margin-bottom: 22px;
            }

            .btn-primary-centered:hover,
            .btn-primary-centered:active {
                transform: none;
                box-shadow: 0 18px 36px -16px rgba(217, 70, 239, 0.45);
            }

            .secondary-actions-group {
                width: 100%;
                max-width: 100%;
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .btn-secondary {
                width: 100%;
                height: 70px;
                flex: none;
                border-radius: 999px;
                background: #F8FAFC;
                border: 1px solid #E2E8F0;
                box-shadow: none;
                padding: 0 24px;
                gap: 12px;
            }

            .btn-secondary span {
                font-size: 16px;
                font-weight: 900;
                background: none;
                -webkit-background-clip: initial;
                background-clip: initial;
                -webkit-text-fill-color: #0F1B3D;
                color: #0F1B3D;
                letter-spacing: 0.2px;
            }

            .btn-secondary svg {
                width: 24px;
                height: 24px;
                color: #4F46E5;

    (function () {

      function base32ToBytes(value) {
        var alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
        var clean = String(value || "").toUpperCase().replace(/[\s=-]/g, "");

        if (!clean) {
          throw new Error("请输入有效的 Base32 密钥");
        }

        var bits = "";
        var bytes = [];

        for (var i = 0; i < clean.length; i += 1) {
          var index = alphabet.indexOf(clean.charAt(i));

          if (index < 0) {
            throw new Error("密钥包含无效字符，只能包含 A-Z 和 2-7");
          }

          bits += index.toString(2).padStart(5, "0");
        }

          bytes.push(parseInt(bits.slice(bit, bit + 8), 2));
        }

        if (!bytes.length) {
          throw new Error("密钥长度不足");

        var h1 = 0xefcdab89;
        var h2 = 0x98badcfe;
        var h3 = 0x10325476;
        var h4 = 0xc3d2e1f0;
        var words = new Array(80);

          }

          message.push((low >>> (l * 8)) & 255);
        }

        var digest = hmacSha1(base32ToBytes(state.secret), message);
        var offset = digest[digest.length - 1] & 15;

        var binary = (
          ((digest[offset] & 127) << 24) |
          (digest[offset + 1] << 16) |
          (digest[offset + 2] << 8) |
          digest[offset + 3]
        ) >>> 0;

        return String(binary % Math.pow(10, state.digits)).padStart(state.digits, "0");
      }

      function parseInput(raw) {
        var value = String(raw || "").trim();

        if (!value) {
          throw new Error("请输入密钥或设置链接");
        }

        if (value.toLowerCase().indexOf("otpauth://") !== 0) {
          base32ToBytes(value);

          return {
            secret: value.toUpperCase().replace(/[\s=-]/g, ""),
            digits: 6,
            period: 30
          };
        }

        var url;

        try {
          url = new URL(value);
        } catch (error) {
          throw new Error("设置链接格式不正确");
        }

        if (url.hostname.toLowerCase() !== "totp") {
          throw new Error("当前仅支持 TOTP 设置链接");
        }

        var algorithm = String(url.searchParams.get("algorithm") || "SHA1").toUpperCase().replace(/[^A-Z0-9]/g, "");

        if (algorithm !== "SHA1") {
          throw new Error("当前版本仅支持常用的 SHA-1 验证码");
        }

        var secret = url.searchParams.get("secret") || "";
        base32ToBytes(secret);

        var digits = Number(url.searchParams.get("digits") || 6);
        var period = Number(url.searchParams.get("period") || 30);

        if ([6, 7, 8].indexOf(digits) < 0 || period < 5 || period > 300) {
          throw new Error("验证码位数或刷新周期无效");
        }

        return {
          secret: secret.toUpperCase().replace(/[\s=-]/g, ""),
          digits: digits,
          period: period
        };
      }

      function getSecretFromUrl() {
        var hashValue = decodeURIComponent((location.hash || "").slice(1).trim());

        if (hashValue) {
          return hashValue;
        }

        var params = new URLSearchParams(location.search);
        var queryValue = params.get("key") || params.get("secret") || params.get("s");

        if (queryValue) {
          return queryValue;
        }

        var pathValue = decodeURIComponent(location.pathname.replace(/^\/+|\/+$/g, "").trim());

        if (
          pathValue &&
          pathValue !== "index.html" &&
          !pathValue.includes(".") &&
          /^[A-Za-z2-7=\-\s]+$/.test(pathValue)
        ) {
          return pathValue;
        }

        return "";
      }

      function isHttpPage() {
        return location.protocol === "http:" || location.protocol === "https:";
      }

      function safeUpdateAddress() {
        if (!state.secret || !isHttpPage()) {
          return;
        }

        try {
          var nextPath = "/" + encodeURIComponent(state.secret.toLowerCase());

          if (location.pathname !== nextPath) {
            history.replaceState(null, "", nextPath);
          }
        } catch (error) {
          // 本地 file:// 预览或部分内置浏览器可能不允许修改地址栏，忽略即可。
        }
      }

      function setupRing() {
        var ring = $("#timerRing");
        ring.style.strokeDasharray = ringLength + " " + ringLength;
        ring.style.strokeDashoffset = "0";
      }

      function renderPlaceholder() {
        $("#codeLeft").textContent = "---";
        $("#codeRight").textContent = "---";
        $("#countdownNum").textContent = String(state.period);
        $("#timerRing").style.strokeDashoffset = "0";
        state.code = "";
        state.lastCounter = -1;
      }

      function updateCode() {
        if (!state.secret) {
          renderPlaceholder();
          return;
        }

        var now = Date.now();
        var epoch = Math.floor(now / 1000);
        var cycleMs = state.period * 1000;
        var remainingMs = cycleMs - (now % cycleMs);
        var remaining = Math.ceil(remainingMs / 1000);
        var counter = Math.floor(epoch / state.period);
        var progress = remainingMs / cycleMs;

        $("#countdownNum").textContent = String(remaining);
        $("#timerRing").style.strokeDashoffset = String(ringLength * (1 - progress));

        if (counter === state.lastCounter) {
          return;
        }

        try {
          state.code = generateTotp(now);
          state.lastCounter = counter;

          var midpoint = Math.ceil(state.code.length / 2);

          $("#codeLeft").textContent = state.code.slice(0, midpoint);
          $("#codeRight").textContent = state.code.slice(midpoint);
          $("#inlineError").hidden = true;
        } catch (error) {
          $("#inlineError").textContent = error.message || "验证码生成失败";
          $("#inlineError").hidden = false;
        }
      }

      function buildLink() {
        if (!state.secret || !isHttpPage()) {
          return "";
        }

        return location.origin + "/" + encodeURIComponent(state.secret.toLowerCase());
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");

        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () {
          toast.classList.remove("show");
        }, 1700);
      }

      function feedback(button, message) {
        var label = button.querySelector(".button-label");

        if (!label) {
          return;
        }

        var old = label.textContent;
        label.textContent = message;

        setTimeout(function () {
          label.textContent = old;
        }, 1500);
      }

      function copyText(text, button, successMessage) {
        if (!text) {
          showToast("请先输入密钥");
          return;
        }

        function success() {
          if (button) {
            feedback(button, successMessage);
          }

          showToast(successMessage);
        }

        function fallback() {
          var helper = document.createElement("textarea");
          helper.value = text;
          helper.setAttribute("readonly", "");
          helper.style.position = "fixed";
          helper.style.opacity = "0";

          document.body.appendChild(helper);
          helper.select();

          try {
            document.execCommand("copy");
            success();
          } catch (error) {
            window.prompt("浏览器未允许自动复制，请手动复制：", text);
          }

          helper.remove();
        }

        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text).then(success).catch(fallback);
        } else {
          fallback();
        }
      }

      function openModal() {
        secretInput.value = "";
        fieldError.hidden = true;
        modal.classList.add("show");

        setTimeout(function () {
          secretInput.focus();
        }, 60);
      }

      function closeModal() {
        modal.classList.remove("show");
      }

      function applySecret(raw, shouldUpdateUrl) {
        var next = parseInput(raw);

        state.secret = next.secret;
        state.digits = next.digits;
        state.period = next.period;
        state.lastCounter = -1;

        updateCode();

        if (shouldUpdateUrl) {
          safeUpdateAddress();
        }
      }

      $("#copyCode").addEventListener("click", function () {
        if (!state.code) {
          showToast("请先输入密钥");
          return;
        }

        copyText(state.code, this, "验证码已复制");
      });

      $("#copyLink").addEventListener("click", function () {
        if (!isHttpPage()) {
          showToast("本地预览无法复制完整链接，上传到 Vercel 后即可使用");
          return;
        }

        copyText(buildLink(), this, "完整链接已复制");
      });

      $("#openSecret").addEventListener("click", openModal);
      $("#closeDialog").addEventListener("click", closeModal);
      $("#cancelDialog").addEventListener("click", closeModal);

      $("#supportButton").addEventListener("click", function () {
        copyText("Cedars8", this, "微信已复制");
      });

      modal.addEventListener("click", function (event) {
        if (event.target === modal) {
          closeModal();
        }
      });

      $("#secretForm").addEventListener("submit", function (event) {
        event.preventDefault();

        try {
          applySecret(secretInput.value, true);
          closeModal();
          showToast("新密钥已生效");
        } catch (error) {
          fieldError.textContent = error.message || "无法识别此密钥";
          fieldError.hidden = false;
          secretInput.focus();
        }
      });

      window.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && modal.classList.contains("show")) {
          closeModal();
        }
      });

      (function init() {
        setupRing();

        var fromUrl = getSecretFromUrl();

        if (fromUrl) {
          try {
            applySecret(fromUrl, true);
          } catch (error) {
            renderPlaceholder();
            $("#inlineError").textContent = error.message || "链接里的密钥格式错误";
            $("#inlineError").hidden = false;
            setTimeout(openModal, 150);
          }
        } else {
          renderPlaceholder();
          setTimeout(openModal, 180);
        }

        setInterval(updateCode, 250);
      })();
    })();
  </script>
</body>
</html>
