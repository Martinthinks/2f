<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>谷歌2FA验证码生成器</title>
  <style>
    :root {
      --bg: #050611;
      --card: #171c2a;
      --card2: #151a27;
      --line: rgba(255,255,255,0.11);
      --text: #f7f8ff;
      --sub: #a9b0c1;
      --muted: #8d94a6;
      --violet: #b856ff;
      --blue: #5c7dff;
      --blue2: #4d8bff;
      --red: #ff6076;
      --yellow: #ffc94d;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 14px;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC",
        "Microsoft YaHei", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 18% 22%, rgba(117, 88, 255, 0.08), transparent 28%),
        radial-gradient(circle at 82% 78%, rgba(70, 132, 255, 0.08), transparent 30%),
        linear-gradient(135deg, #060711 0%, #090b16 46%, #03040a 100%);
    }

    .page {
      width: min(100%, 700px);
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 31px;
      padding: 40px 42px 27px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.012)),
        linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow:
        0 28px 70px rgba(0,0,0,0.44),
        inset 0 1px 0 rgba(255,255,255,0.06);
      text-align: center;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(108, 125, 255, 0.11), transparent 36%),
        linear-gradient(115deg, transparent 0 24%, rgba(255,255,255,0.025) 44%, transparent 64% 100%);
      pointer-events: none;
    }

    .top,
    .main {
      position: relative;
    }

    .logo {
      width: 58px;
      height: 58px;
      display: block;
      margin: 0 auto 28px;
      filter: drop-shadow(0 10px 20px rgba(92, 125, 255, 0.18));
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5.4vw, 43px);
      line-height: 1.12;
      letter-spacing: -1.3px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 12px 26px rgba(0,0,0,0.25);
    }

    h1 span {
      background: linear-gradient(100deg, #ffffff 0%, #efb7ff 28%, #b85cff 48%, #5b7dff 70%, #58a2ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: none;
    }

    .sub {
      margin-top: 14px;
      color: var(--sub);
      font-size: clamp(17px, 3vw, 22px);
      font-weight: 730;
      letter-spacing: -0.3px;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 35px 0 55px;
    }

    .timerBox {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 0 auto 40px;
    }

    .timerBox svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      overflow: visible;
    }

    .circle-bg {
      fill: rgba(255,255,255,0.015);
      stroke: rgba(255,255,255,0.085);
      stroke-width: 12;
      stroke-linecap: round;
    }

    .circle-progress {
      fill: none;
      stroke: url(#timerGradient);
      stroke-width: 12;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.35s linear;
      filter: drop-shadow(0 0 8px rgba(99, 117, 255, 0.16));
    }

    .seconds {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 45px;
      font-weight: 860;
      color: #fff;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 10px 22px rgba(0,0,0,0.28);
    }

    .code {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      margin: 0 0 43px;
      font-size: clamp(56px, 11vw, 86px);
      line-height: 1;
      font-weight: 880;
      letter-spacing: 14px;
      font-variant-numeric: tabular-nums;
    }

    .code span {
      min-width: 3ch;
      display: inline-block;
      background: linear-gradient(104deg, #ffd9ff 0%, #b959ff 37%, #8290ff 70%, #5c82ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 18px 32px rgba(0,0,0,0.25);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 0.64fr;
      gap: 16px;
      margin-top: 0;
    }

    button {
      height: 68px;
      border: 0;
      border-radius: 20px;
      cursor: pointer;
      font-size: 20px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: transform .12s ease, opacity .12s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .copy {
      color: #fff;
      background: linear-gradient(135deg, #bd52ff 0%, #7a63ff 48%, #4d86ff 100%);
      box-shadow: 0 16px 32px rgba(111, 96, 255, 0.25);
    }

    .change {
      color: #e7ebf7;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.11);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .copyIcon {
      width: 25px;
      height: 25px;
      flex: none;
    }

    .safeTip {
      margin-top: 25px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      font-weight: 560;
      text-align: center;
    }

    .modalMask {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(4, 5, 12, 0.70);
      backdrop-filter: blur(12px);
    }

    .modalMask.show {
      display: flex;
    }

    .modal {
      width: min(100%, 430px);
      padding: 24px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.018)),
        #171c2a;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 26px 80px rgba(0,0,0,0.50);
      text-align: left;
    }

    .modal h2 {
      margin: 0 0 8px;
      color: #fff;
      font-size: 23px;
      font-weight: 830;
      letter-spacing: -0.4px;
    }

    .modal p {
      margin: 0 0 18px;
      color: var(--sub);
      line-height: 1.65;
      font-size: 13px;
    }

    .modal label {
      display: block;
      margin-bottom: 8px;
      color: #eef2fb;
      font-weight: 760;
      font-size: 13px;
    }

    .secretInput {
      width: 100%;
      height: 52px;
      border-radius: 15px;
      border: 1px solid rgba(255,255,255,0.13);
      outline: none;
      background: rgba(255,255,255,0.045);
      color: #fff;
      padding: 0 14px;
      font-size: 15px;
      font-weight: 650;
      letter-spacing: .8px;
      text-transform: uppercase;
    }

    .secretInput::placeholder {
      color: rgba(230,235,245,0.34);
    }

    .secretInput:focus {
      border-color: rgba(126, 112, 255, 0.82);
      box-shadow: 0 0 0 4px rgba(126, 112, 255, 0.10);
    }

    .error {
      min-height: 18px;
      margin-top: 9px;
      color: var(--red);
      font-size: 12px;
    }

    .modalActions {
      display: grid;
      grid-template-columns: 1fr 0.64fr;
      gap: 10px;
      margin-top: 14px;
    }

    .modalActions button {
      height: 50px;
      font-size: 15px;
      border-radius: 14px;
    }

    .primarySmall {
      color: #fff;
      background: linear-gradient(135deg, #bd52ff, #7469ff 52%, #4d86ff);
    }

    .ghostSmall {
      color: #dce2ef;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      z-index: 30;
      transform: translateX(-50%) translateY(18px);
      padding: 11px 16px;
      border-radius: 999px;
      color: #fff;
      background: rgba(18, 22, 34, 0.92);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 14px 44px rgba(0,0,0,0.38);
      opacity: 0;
      pointer-events: none;
      transition: .2s ease;
      font-size: 14px;
      backdrop-filter: blur(14px);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 620px) {
      body {
        padding: 16px 10px;
      }

      .card {
        padding: 32px 18px 22px;
        border-radius: 25px;
      }

      .logo {
        width: 50px;
        height: 50px;
        margin-bottom: 22px;
      }

      .divider {
        margin: 28px 0 38px;
      }

      .timerBox {
        width: 128px;
        height: 128px;
        margin-bottom: 30px;
      }

      .circle-bg,
      .circle-progress {
        stroke-width: 11;
      }

      .seconds {
        font-size: 38px;
      }

      .code {
        gap: 16px;
        letter-spacing: 8px;
        margin-bottom: 32px;
      }

      .actions,
      .modalActions {
        grid-template-columns: 1fr;
      }

      button {
        height: 58px;
        font-size: 17px;
      }

      .safeTip {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <header class="top">
        <svg class="logo" viewBox="0 0 128 128" aria-hidden="true">
          <defs>
            <linearGradient id="logoRing" x1="18" y1="18" x2="110" y2="110" gradientUnits="userSpaceOnUse">
              <stop stop-color="#c159ff"/>
              <stop offset="0.54" stop-color="#7c6bff"/>
              <stop offset="1" stop-color="#4d86ff"/>
            </linearGradient>
          </defs>
          <circle cx="64" cy="64" r="47" fill="rgba(255,255,255,.02)" stroke="url(#logoRing)" stroke-width="8"/>
          <circle cx="64" cy="64" r="34" fill="none" stroke="rgba(255,255,255,.82)" stroke-width="5.5" stroke-dasharray="11 9"/>
          <line x1="64" y1="64" x2="64" y2="34" stroke="#ff6076" stroke-width="8" stroke-linecap="round"/>
          <line x1="64" y1="64" x2="91" y2="80" stroke="#ff6076" stroke-width="8" stroke-linecap="round"/>
          <circle cx="64" cy="64" r="10" fill="#ffc94d"/>
        </svg>

        <h1>谷歌<span>2FA验证码</span>生成器</h1>
        <div class="sub">Gmail邮箱两步验证码在线生成工具</div>
      </header>

      <div class="main">
        <div class="divider"></div>

        <section class="timerBox" aria-label="验证码倒计时">
          <svg viewBox="0 0 150 150">
            <defs>
              <linearGradient id="timerGradient" x1="10" y1="10" x2="140" y2="140" gradientUnits="userSpaceOnUse">
                <stop stop-color="#bd52ff"/>
                <stop offset="0.55" stop-color="#7769ff"/>
                <stop offset="1" stop-color="#4d86ff"/>
              </linearGradient>
            </defs>
            <circle class="circle-bg" cx="75" cy="75" r="58"></circle>
            <circle id="circleProgress" class="circle-progress" cx="75" cy="75" r="58"></circle>
          </svg>
          <div class="seconds" id="seconds">--</div>
        </section>

        <div class="code" aria-label="当前验证码">
          <span id="codeA">---</span>
          <span id="codeB">---</span>
        </div>

        <div class="actions">
          <button class="copy" id="copyBtn">
            <svg class="copyIcon" viewBox="0 0 48 48" fill="none" aria-hidden="true">
              <rect x="17" y="17" width="22" height="22" rx="4" stroke="white" stroke-width="4"/>
              <path d="M10 30V14a4 4 0 0 1 4-4h16" stroke="white" stroke-width="4" stroke-linecap="round"/>
            </svg>
            复制验证码
          </button>
          <button class="change" id="changeBtn">更换密钥</button>
        </div>

        <div class="safeTip">建议2天后修改为自己的身份验证器密钥 以保护账户安全</div>
      </div>
    </section>
  </main>

  <div class="modalMask show" id="modalMask">
    <div class="modal">
      <h2>输入2FA密钥</h2>
      <p>请输入 Google 身份验证器的 Base32 密钥。也支持 /密钥、#密钥、?key=密钥 三种链接直达方式。</p>
      <label for="secretInput">32位密钥</label>
      <input class="secretInput" id="secretInput" autocomplete="off" autocapitalize="characters"
             placeholder="例如 JBSWY3DPEHPK3PXP" />
      <div class="error" id="errorText"></div>
      <div class="modalActions">
        <button class="primarySmall" id="saveSecretBtn">开始生成</button>
        <button class="ghostSmall" id="clearBtn">清空</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已复制</div>

  <script>
    const PERIOD = 30;
    const DIGITS = 6;
    const RADIUS = 58;
    const CIRCUMFERENCE = 2 * Math.PI * RADIUS;

    let secret = "";
    let currentCode = "";
    let timer = null;

    const progress = document.getElementById("circleProgress");
    const secondsEl = document.getElementById("seconds");
    const codeA = document.getElementById("codeA");
    const codeB = document.getElementById("codeB");
    const modalMask = document.getElementById("modalMask");
    const secretInput = document.getElementById("secretInput");
    const errorText = document.getElementById("errorText");
    const toast = document.getElementById("toast");

    progress.style.strokeDasharray = CIRCUMFERENCE;
    progress.style.strokeDashoffset = CIRCUMFERENCE;

    function cleanSecret(value) {
      return value.replace(/\s+/g, "").replace(/-/g, "").replace(/=+$/g, "").toUpperCase();
    }

    function base32ToBytes(base32) {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
      let bits = "";
      const bytes = [];

      if (!base32 || base32.length < 8) {
        throw new Error("密钥太短，请检查是否复制完整");
      }

      for (const char of base32) {
        const val = alphabet.indexOf(char);
        if (val === -1) {
          throw new Error("密钥格式错误，只能包含 A-Z 和 2-7");
        }
        bits += val.toString(2).padStart(5, "0");
      }

      for (let i = 0; i + 8 <= bits.length; i += 8) {
        bytes.push(parseInt(bits.slice(i, i + 8), 2));
      }

      return new Uint8Array(bytes);
    }

    function counterToBuffer(counter) {
      const buffer = new ArrayBuffer(8);
      const view = new DataView(buffer);
      view.setUint32(0, Math.floor(counter / 0x100000000), false);
      view.setUint32(4, counter >>> 0, false);
      return buffer;
    }

    async function generateTOTP(base32Secret) {
      const keyBytes = base32ToBytes(base32Secret);
      const counter = Math.floor(Date.now() / 1000 / PERIOD);

      const cryptoKey = await crypto.subtle.importKey(
        "raw",
        keyBytes,
        { name: "HMAC", hash: "SHA-1" },
        false,
        ["sign"]
      );

      const hmac = new Uint8Array(
        await crypto.subtle.sign("HMAC", cryptoKey, counterToBuffer(counter))
      );

      const offset = hmac[hmac.length - 1] & 0x0f;
      const binary =
        ((hmac[offset] & 0x7f) << 24) |
        ((hmac[offset + 1] & 0xff) << 16) |
        ((hmac[offset + 2] & 0xff) << 8) |
        (hmac[offset + 3] & 0xff);

      return String(binary % 10 ** DIGITS).padStart(DIGITS, "0");
    }

    function renderCode(code) {
      currentCode = code;
      codeA.textContent = code.slice(0, 3);
      codeB.textContent = code.slice(3, 6);
    }

    function renderCountdown() {
      const now = Math.floor(Date.now() / 1000);
      const remain = PERIOD - (now % PERIOD);
      secondsEl.textContent = remain;
      const percent = remain / PERIOD;
      progress.style.strokeDashoffset = CIRCUMFERENCE * (1 - percent);
    }

    async function tick() {
      if (!secret) return;

      try {
        const code = await generateTOTP(secret);
        renderCode(code);
        renderCountdown();
      } catch (e) {
        showModal();
        errorText.textContent = e.message || "生成失败，请检查密钥";
        renderCode("------");
        secondsEl.textContent = "--";
        progress.style.strokeDashoffset = CIRCUMFERENCE;
      }
    }

    function showModal() {
      modalMask.classList.add("show");
      setTimeout(() => secretInput.focus(), 80);
    }

    function hideModal() {
      modalMask.classList.remove("show");
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function getSecretFromUrl() {
      const hashValue = decodeURIComponent((location.hash || "").slice(1).trim());
      if (hashValue) return hashValue;

      const params = new URLSearchParams(location.search);
      const queryValue = params.get("key") || params.get("secret") || params.get("s");
      if (queryValue) return queryValue;

      const pathValue = decodeURIComponent(location.pathname.replace(/^\/+|\/+$/g, "").trim());
      if (
        pathValue &&
        pathValue !== "index.html" &&
        !pathValue.includes(".") &&
        /^[A-Za-z2-7=\-\s]+$/.test(pathValue)
      ) {
        return pathValue;
      }

      return "";
    }

    async function startWithSecret(value) {
      const cleaned = cleanSecret(value);
      base32ToBytes(cleaned);

      secret = cleaned;
      secretInput.value = cleaned;
      hideModal();
      await tick();

      if (timer) clearInterval(timer);
      timer = setInterval(tick, 1000);
    }

    document.getElementById("saveSecretBtn").addEventListener("click", async () => {
      errorText.textContent = "";
      const value = secretInput.value;

      try {
        await startWithSecret(value);
        history.replaceState(null, "", "/#" + encodeURIComponent(cleanSecret(value)));
      } catch (e) {
        errorText.textContent = e.message || "密钥格式错误";
      }
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      secretInput.value = "";
      errorText.textContent = "";
      secretInput.focus();
    });

    document.getElementById("changeBtn").addEventListener("click", () => {
      showModal();
      secretInput.select();
    });

    document.getElementById("copyBtn").addEventListener("click", async () => {
      if (!currentCode || currentCode.includes("-")) {
        showToast("请先输入密钥");
        return;
      }

      try {
        await navigator.clipboard.writeText(currentCode);
        showToast("验证码已复制");
      } catch {
        const area = document.createElement("textarea");
        area.value = currentCode;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
        showToast("验证码已复制");
      }
    });

    secretInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        document.getElementById("saveSecretBtn").click();
      }
    });

    (async function startFromUrlSecret() {
      const rawValue = getSecretFromUrl();
      if (!rawValue) return;

      try {
        await startWithSecret(rawValue);

        // 支持 /密钥 与 ?key=密钥 打开后，自动转换成 #密钥 格式。
        if (location.hash.slice(1) !== secret) {
          history.replaceState(null, "", "/#" + encodeURIComponent(secret));
        }
      } catch (e) {
        showModal();
        errorText.textContent = e.message || "链接里的密钥格式错误";
      }
    })();

    renderCode("------");
  </script>
</body>
</html>
